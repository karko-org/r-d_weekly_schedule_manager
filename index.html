    const range = XLSX.utils.decode_range(ws['!ref']);
    // 연간 시그니처: R4(인덱스 3)에 1~52 연속 숫자 40개 이상
    let annualMatches = 0;
    const maxCol = Math.min(60, range.e.c);
    for (let c = 1; c <= maxCol; c++){
      const cell = ws[XLSX.utils.encode_cell({r: 3, c})];
      if (cell && typeof cell.v === 'number' && cell.v === c) annualMatches++;
    }
    if (annualMatches >= 40) return 'annual';
    // 월간 시그니처: 상단 몇 행 내에 1~31 연속 숫자 20개 이상
    const scanEnd = Math.min(range.s.r + 6, range.e.r);
    for (let r = range.s.r; r <= scanEnd; r++){
      let m = 0;
      for (let c = 1; c <= 31 && c <= range.e.c; c++){
        const cell = ws[XLSX.utils.encode_cell({r, c})];
        if (cell && typeof cell.v === 'number' && cell.v === c) m++;
      }
      if (m >= 20) return 'monthly';
    }
    return 'unknown';
  }

  function tryImportExcel(arrayBuffer, filename){
    const result = { monthly: { parsed: {}, count: 0, sheet: null }, annual: { parsed: null, count: 0, sheet: null } };
    try {
      const wb = XLSX.read(new Uint8Array(arrayBuffer), { type: 'array', cellStyles: true });
      // MCE-aware 색상 맵 — xlsx-js-style이 놓친 스타일 복구
      const mceColorMap = buildMceStyleMap(arrayBuffer);
      for (const sheetName of wb.SheetNames){
        const ws = wb.Sheets[sheetName];
        const kind = detectSheetKind(ws);
        if (kind === 'monthly'){
          const parsed = parseMonthlyCalendar(ws, sheetName, mceColorMap);
          const count = Object.values(parsed).reduce((s,arr) => s+arr.length, 0);
          if (count > result.monthly.count){ result.monthly = { parsed, count, sheet: sheetName }; }
        } else if (kind === 'annual'){
          const annual = parseAnnualCalendar(ws, sheetName, mceColorMap);
          const count = annual ? annual.projects.reduce((s,p) => s + (p.bars||[]).length, 0) : 0;
          if (annual && count >= result.annual.count){ result.annual = { parsed: annual, count, sheet: sheetName }; }
        }
      }
    } catch(err){
      console.warn('Import failed:', err);
    }
    return result;
  }

  function parseMonthlyCalendar(ws, sheetName, colorMap){
    if (!ws || !ws['!ref']) return {};
    const range = XLSX.utils.decode_range(ws['!ref']);
    const merges = (ws['!merges'] || []);

    let year = new Date().getFullYear();
    for (let r = range.s.r; r <= Math.min(range.s.r+5, range.e.r); r++){
      for (let c = range.s.c; c <= range.e.c; c++){
        const cell = ws[XLSX.utils.encode_cell({r,c})];
        if (cell && typeof cell.v === 'string'){
          const m = cell.v.match(/(\d{4})\s*년/);
          if (m){ year = parseInt(m[1],10); break; }
        }
      }
    }

    let dayRowIdx = -1;
    for (let r = range.s.r; r <= range.e.r; r++){
      let matches = 0;
      for (let c = 1; c <= 31 && c <= range.e.c; c++){
        const cell = ws[XLSX.utils.encode_cell({r,c})];
        if (cell && typeof cell.v === 'number' && cell.v === c) matches++;
      }
      if (matches >= 20){ dayRowIdx = r; break; }
    }
    if (dayRowIdx === -1) return {};

    const monthStarts = [];
    for (let r = dayRowIdx + 1; r <= range.e.r; r++){
      const cell = ws[XLSX.utils.encode_cell({r, c: 0})];
      if (cell && typeof cell.v === 'string'){
        const m = cell.v.match(/(\d{1,2})\s*월/);
        if (m){
          const mn = parseInt(m[1],10);
          if (mn >= 1 && mn <= 12) monthStarts.push({ row: r, month: mn - 1 });
        }
      }
    }
    if (monthStarts.length === 0) return {};

    monthStarts.forEach((ms, i) => {
      const merge = merges.find(mg => mg.s.r === ms.row && mg.s.c === 0);
      if (merge){ ms.endRow = merge.e.r; }
      else if (i + 1 < monthStarts.length){ ms.endRow = monthStarts[i+1].row - 1; }
      else { ms.endRow = range.e.r; }
    });

    const result = {};
    let curYear = year;
    let prevMonth = null;
    monthStarts.forEach(ms => {
      // 월 번호가 이전 월보다 작아지면 연도가 롤오버된 것으로 간주
      if (prevMonth !== null && ms.month < prevMonth) curYear += 1;
      const key = `${curYear}-${pad(ms.month+1)}`;
      if (!result[key]) result[key] = [];
      for (let r = ms.row + 1; r <= ms.endRow; r++){
        for (let c = 1; c <= 31 && c <= range.e.c; c++){
          const cell = ws[XLSX.utils.encode_cell({r,c})];
          if (!cell || cell.v === undefined || cell.v === null) continue;
          const val = typeof cell.v === 'string' ? cell.v.trim() : String(cell.v).trim();
          if (!val) continue;
          if (WEEKDAYS_KR.includes(val)) continue;
          const merge = merges.find(mg => mg.s.r === r && mg.s.c === c);
          const endCol = merge ? merge.e.c : c;
          if (!merge){
            const insideMerge = merges.find(mg => mg.s.r === r && mg.s.c < c && mg.e.c >= c);
            if (insideMerge) continue;
          }
          const startDay = c;
          const endDay = Math.min(endCol, 31);
          if (startDay < 1 || startDay > 31) continue;
          // 셀 코멘트를 notes로 추출
          const noteText = (cell.c && cell.c.length)
            ? cell.c.map(cm => (cm.t || '')).join('\n').trim()
            : '';
          const addr = XLSX.utils.encode_cell({r, c: startDay});
          result[key].push({ title: val, start: startDay, end: endDay, notes: noteText, color: extractCellColor(cell, colorMap, sheetName, addr) });
        }
      }
      prevMonth = ms.month;
    });

    return result;
  }

  // 셀 배경색 추출. MCE 스타일 맵(sheetName:{ref:hex})이 있으면 먼저 조회, 없으면 cell.s 폴백.
  function extractCellColor(cell, colorMap, sheetName, addr){
    if (colorMap && sheetName && addr){
      const m = colorMap[sheetName];
      if (m && m[addr]) return m[addr];
    }
    if (!cell || !cell.s) return null;
    const s = cell.s;
    const pt = s.patternType || (s.fill && s.fill.patternType);
    if (pt === 'none') return null;
    const fg = s.fgColor || (s.fill && s.fill.fgColor);
    if (fg && typeof fg.rgb === 'string'){
      const hex = fg.rgb.length === 8 ? fg.rgb.slice(2) : fg.rgb;
      return hex.toUpperCase();
    }
    const bg = s.bgColor || (s.fill && s.fill.bgColor);
    if (bg && typeof bg.rgb === 'string'){
      const hex = bg.rgb.length === 8 ? bg.rgb.slice(2) : bg.rgb;
      return hex.toUpperCase();
    }
    return null;
  }

  // 배경색 기준으로 읽기 쉬운 텍스트 색 결정 (YIQ 공식)
  function contrastTextColor(hex){
    if (!hex || typeof hex !== 'string' || hex.length < 6) return null;
    const h = hex.length === 8 ? hex.slice(2) : hex;
    const r = parseInt(h.slice(0,2), 16);
    const g = parseInt(h.slice(2,4), 16);
    const b = parseInt(h.slice(4,6), 16);
    const yiq = (r*299 + g*587 + b*114) / 1000;
    return yiq >= 150 ? '#1a1814' : '#ffffff';
  }

  function parseAnnualCalendar(ws, sheetName, colorMap){
    if (!ws || !ws['!ref']) return null;
    const range = XLSX.utils.decode_range(ws['!ref']);
    const merges = (ws['!merges'] || []);

    // (1) R1~R5 안에서 "YYYY년" 탐색 → year + title
    let year = new Date().getFullYear();
    let title = '';
    for (let r = range.s.r; r <= Math.min(range.s.r+4, range.e.r); r++){
      for (let c = range.s.c; c <= range.e.c; c++){
        const cell = ws[XLSX.utils.encode_cell({r,c})];
        if (cell && typeof cell.v === 'string'){
          const m = cell.v.match(/(\d{4})\s*년/);
          if (m){ year = parseInt(m[1],10); title = cell.v; break; }
        }
      }
      if (title) break;
    }
    if (!title) title = `${year}년 연구 개발 계획`;

    // (2) R4 (index 3) 에서 1..N 연속 주 순 읽어 totalWeeks 결정
    let totalWeeks = 0;
    for (let c = 1; c <= range.e.c; c++){
      const cell = ws[XLSX.utils.encode_cell({r: 3, c})];
      if (cell && typeof cell.v === 'number' && cell.v === c) totalWeeks = c;
      else break;
    }
    if (totalWeeks < 20) return null; // 형식 불일치

    // (3) R2 (index 1) 월 레이블 + 병합 범위 → monthWeeks
    const monthWeeks = [];
    for (let c = 1; c <= totalWeeks; c++){
      const cell = ws[XLSX.utils.encode_cell({r: 1, c})];
      if (!cell || cell.v === undefined || cell.v === null) continue;
      let monthNum = null;
      if (typeof cell.v === 'number') monthNum = cell.v;
      else {
        const s = String(cell.v).trim();
        const m = s.match(/(\d{1,2})/);
        if (m) monthNum = parseInt(m[1], 10);
      }
      if (!Number.isFinite(monthNum) || monthNum < 1 || monthNum > 12) continue;
      const merge = merges.find(mg => mg.s.r === 1 && mg.s.c === c);
      const endCol = merge ? merge.e.c : c;
      monthWeeks.push({ month: monthNum, startCol: c, endCol: Math.min(endCol, totalWeeks), weekCount: Math.min(endCol, totalWeeks) - c + 1 });
    }
    // 12개월이 다 안 찼으면 균등 분할 fallback
    if (monthWeeks.length < 12){
      const fb = defaultMonthWeeks();
      if (totalWeeks === 52){ /* 기본값 그대로 */ } else {
        // totalWeeks가 52가 아닌 경우 균등 분할 재계산
        const per = Math.floor(totalWeeks / 12);
        let col = 1;
        fb.length = 0;
        for (let i = 0; i < 12; i++){
          const wc = per + ((i < totalWeeks % 12) ? 1 : 0);
          fb.push({ month: i+1, startCol: col, endCol: col + wc - 1, weekCount: wc });
          col += wc;
        }
      }
      // 파싱된 부분은 우선 사용, 빈 월은 fallback으로 채움
      const filled = new Map(monthWeeks.map(mw => [mw.month, mw]));
      fb.forEach(mw => { if (!filled.has(mw.month)) monthWeeks.push(mw); });
      monthWeeks.sort((a,b) => a.month - b.month);
    }

    // (4) R5부터 프로젝트 행: A열 숫자가 행 번호. 각 행의 병합 범위별로 바 추출
    const projects = [];
    for (let r = 4; r <= range.e.r; r++){
      const labelCell = ws[XLSX.utils.encode_cell({r, c: 0})];
      if (!labelCell || labelCell.v === undefined || labelCell.v === null) continue;
      let rowIndex = null;
      if (typeof labelCell.v === 'number') rowIndex = labelCell.v;
      else {
        const s = String(labelCell.v).trim();
        const m = s.match(/^\d+/);
        if (m) rowIndex = parseInt(m[0], 10);
      }
      if (!Number.isFinite(rowIndex)) continue;

      const bars = [];
      for (let c = 1; c <= totalWeeks; c++){
        const cell = ws[XLSX.utils.encode_cell({r, c})];
        if (!cell || cell.v === undefined || cell.v === null) continue;
        const val = typeof cell.v === 'string' ? cell.v.trim() : String(cell.v).trim();
        if (!val) continue;
        const merge = merges.find(mg => mg.s.r === r && mg.s.c === c);
        const endCol = merge ? merge.e.c : c;
        if (!merge){
          const inside = merges.find(mg => mg.s.r === r && mg.s.c < c && mg.e.c >= c);
          if (inside) continue;
        }
        const noteText = (cell.c && cell.c.length)
          ? cell.c.map(cm => (cm.t || '')).join('\n').trim()
          : '';
        const addr = XLSX.utils.encode_cell({r, c});
        bars.push({
          id: barUid(),
          startWeek: c,
          endWeek: Math.min(endCol, totalWeeks),
          title: val,
          notes: noteText,
          color: extractCellColor(cell, colorMap, sheetName, addr)
        });
      }

      projects.push({ id: projUid(), rowIndex, bars });
    }

    return { year, title, totalWeeks, monthWeeks, projects };
  }

  // ---------- Excel Export ----------
  function buildMonthlySheet(){
    const writer = {
      name: document.getElementById('writer-name').value.trim(),
      dept: document.getElementById('writer-dept').value.trim()
    };
    const MAX_DAYS = 31;
    const monthKeys = Object.keys(monthData).filter(k => (monthData[k].tasks || []).length > 0).sort();

    const rows = [];
    const merges = [];
    const cellNotesToAdd = [];
    const cellStylesToAdd = [];

    const title = writer.name ? `업무 일정 및 계획 (${writer.dept||''}${writer.dept?' · ':''}${writer.name})` : '업무 일정 및 계획';
    const titleRow = [title];
    for (let i = 0; i < MAX_DAYS; i++) titleRow.push('');
    rows.push(titleRow);
    merges.push({s:{r:0,c:0},e:{r:0,c:MAX_DAYS}});

    const header = ['        일\n달'];
    for (let d = 1; d <= MAX_DAYS; d++) header.push(d);
    rows.push(header);

    monthKeys.forEach(key => {
      const parts = key.split('-');
      const y = parseInt(parts[0],10);
      const m = parseInt(parts[1],10) - 1;
      const days = daysInMonth(y,m);
      const { rowCount, ordered } = assignRows([...monthData[key].tasks]);

      const monthStartRowIdx = rows.length;

      const wdRow = [`${m+1}월`];
      for (let d = 1; d <= MAX_DAYS; d++){
        wdRow.push(d <= days ? WEEKDAYS_KR[weekdayOf(y,m,d)] : '');
      }
      rows.push(wdRow);

      const taskRows = [];
      for (let r = 0; r < rowCount; r++){
        const row = [''];
        for (let d = 0; d < MAX_DAYS; d++) row.push('');
        taskRows.push(row);
      }
      ordered.forEach(t => { taskRows[t._row][t.start] = t.title || ''; });
      taskRows.forEach(r => rows.push(r));

      merges.push({s:{r:monthStartRowIdx,c:0},e:{r:monthStartRowIdx + rowCount, c:0}});
      ordered.forEach(t => {
        if (t.end > t.start){
          merges.push({
            s:{r: monthStartRowIdx + 1 + t._row, c: t.start},
            e:{r: monthStartRowIdx + 1 + t._row, c: t.end}
          });
        }
        if (t.notes && t.notes.trim()){
          cellNotesToAdd.push({
            r: monthStartRowIdx + 1 + t._row,
            c: t.start,
            text: t.notes
          });
        }
        if (t.color){
          cellStylesToAdd.push({
            r: monthStartRowIdx + 1 + t._row,
            c: t.start,
            color: t.color
          });
        }
      });
    });

    const ws = XLSX.utils.aoa_to_sheet(rows);
    ws['!merges'] = merges;
    const cols = [{wch:10}];
    for (let i = 0; i < MAX_DAYS; i++) cols.push({wch:4.5});
    ws['!cols'] = cols;

    cellNotesToAdd.forEach(({r, c, text}) => {
      const addr = XLSX.utils.encode_cell({r, c});
      if (ws[addr]){
        ws[addr].c = [{ a: 'KAR 일정', t: text }];
      }
    });

    // 바 배경색 복원
    cellStylesToAdd.forEach(({ r, c, color }) => {
      const addr = XLSX.utils.encode_cell({ r, c });
      if (ws[addr]){
        const prev = ws[addr].s || {};
        ws[addr].s = Object.assign({}, prev, {
          fill: { patternType: 'solid', fgColor: { rgb: color }, bgColor: { rgb: color } },
          patternType: 'solid',
          fgColor: { rgb: color },
          bgColor: { rgb: color }
        });
      }
    });

    return ws;
  }

  function buildAnnualSheet(annual){
    const totalCols = annual.totalWeeks || 52;
    const rows = [];
    const merges = [];
    const cellNotesToAdd = [];
    const cellStylesToAdd = []; // {r, c, color} — 저장 후 ws[addr].s에 적용

    // R1: 타이틀 (A1:??1 병합)
    const titleRow = [annual.title || `${annual.year}년 연구 개발 계획`];
    for (let i = 0; i < totalCols; i++) titleRow.push('');
    rows.push(titleRow);
    merges.push({ s:{r:0,c:0}, e:{r:0, c: totalCols} });

    // R2: 월 레이블
    const r2 = ['월'];
    for (let i = 0; i < totalCols; i++) r2.push('');
    annual.monthWeeks.forEach(mw => {
      r2[mw.startCol] = mw.month;
      if (mw.endCol > mw.startCol){
        merges.push({ s:{r:1,c:mw.startCol}, e:{r:1,c:mw.endCol} });
      }
    });
    rows.push(r2);

    // R3: 월 내 주 번호
    const r3 = ['주'];
    for (let i = 0; i < totalCols; i++) r3.push('');
    annual.monthWeeks.forEach(mw => {
      for (let w = 1; w <= mw.weekCount; w++){
        r3[mw.startCol + w - 1] = w;
      }
    });
    rows.push(r3);

    // R4: 연속 주 순 1..totalCols
    const r4 = ['    주\n순'];
    for (let w = 1; w <= totalCols; w++) r4.push(w);
    rows.push(r4);

    // R5~: 프로젝트 행
    annual.projects.forEach((p, idx) => {
      const rowIdx = 4 + idx;
      const rowArr = [p.rowIndex];
      for (let i = 0; i < totalCols; i++) rowArr.push('');
      (p.bars || []).forEach(bar => {
        const sw = Math.max(1, Math.min(totalCols, bar.startWeek));
        const ew = Math.max(sw, Math.min(totalCols, bar.endWeek));
        rowArr[sw] = bar.title || '';
        if (ew > sw){
          merges.push({ s:{r:rowIdx, c:sw}, e:{r:rowIdx, c:ew} });
        }
        if (bar.notes && bar.notes.trim()){
          cellNotesToAdd.push({ r: rowIdx, c: sw, text: bar.notes });
        }
        if (bar.color){
          cellStylesToAdd.push({ r: rowIdx, c: sw, color: bar.color });
        }
      });
      rows.push(rowArr);
    });

    const ws = XLSX.utils.aoa_to_sheet(rows);
    ws['!merges'] = merges;
    const cols = [{ wch: 6 }];
    for (let i = 0; i < totalCols; i++) cols.push({ wch: 3.5 });
    ws['!cols'] = cols;

    cellNotesToAdd.forEach(({ r, c, text }) => {
      const addr = XLSX.utils.encode_cell({ r, c });
      if (ws[addr]){
        ws[addr].c = [{ a: 'KAR 일정', t: text }];
      }
    });

    // 바 배경색 복원 (xlsx-js-style 포맷)
    cellStylesToAdd.forEach(({ r, c, color }) => {
      const addr = XLSX.utils.encode_cell({ r, c });
      if (ws[addr]){
        const prev = ws[addr].s || {};
        ws[addr].s = Object.assign({}, prev, {
          fill: { patternType: 'solid', fgColor: { rgb: color }, bgColor: { rgb: color } },
          // 상위 레벨 속성도 함께 — 일부 엑셀 버전 호환
          patternType: 'solid',
          fgColor: { rgb: color },
          bgColor: { rgb: color }
        });
      }
    });

    return ws;
  }

  function buildExcelBuffer(){
    const wb = XLSX.utils.book_new();
    const monthKeys = Object.keys(monthData).filter(k => (monthData[k].tasks || []).length > 0);
    const hasMonthly = monthKeys.length > 0;

    // 연간 데이터가 있는 연도들 (바가 하나라도 있는 것만)
    const annualYears = Object.keys(annualData).filter(k => {
      const a = annualData[k];
      return a && (a.projects || []).some(p => (p.bars || []).length > 0);
    });
    // 현재 선택된 연도를 우선 사용. 없으면 첫 번째.
    let annualToWrite = null;
    if (annualData[String(currentAnnualYear)] && (annualData[String(currentAnnualYear)].projects || []).some(p => (p.bars || []).length > 0)){
      annualToWrite = annualData[String(currentAnnualYear)];
    } else if (annualYears.length > 0){
      annualToWrite = annualData[annualYears[0]];
    }

    if (annualToWrite){
      XLSX.utils.book_append_sheet(wb, buildAnnualSheet(annualToWrite), 'Sheet1');
    }
    if (hasMonthly){
      XLSX.utils.book_append_sheet(wb, buildMonthlySheet(), 'Sheet2');
    }
    // 양쪽 다 없으면 빈 Sheet2 (기존 동작 유지)
    if (!annualToWrite && !hasMonthly){
      XLSX.utils.book_append_sheet(wb, buildMonthlySheet(), 'Sheet2');
    }

    return XLSX.write(wb, { type: 'array', bookType: 'xlsx' });
  }

  // ---------- Briefing view ----------

  function renderBriefingCalendar(){
    const grid = document.getElementById('briefing-calendar');
    const days = daysInMonth(briefingYear, briefingMonth);
    const { rowCount, ordered } = assignRows(getMonth(briefingYear, briefingMonth).tasks);
    const {start, end} = getBriefingWeekRange();

    grid.style.gridTemplateColumns = `68px repeat(${days}, minmax(30px, 1fr))`;
    grid.style.gridTemplateRows = `auto auto repeat(${rowCount}, auto)`;
    grid.innerHTML = '';

    const corner = document.createElement('div');
    corner.className = 'cal-corner';
    corner.textContent = `   일\n달`;
    grid.appendChild(corner);

    for (let d = 1; d <= days; d++){
      const el = document.createElement('div');
      el.className = 'cal-day-num';
      if (isTodayDay(briefingYear,briefingMonth,d)) el.classList.add('is-today');
      else if (isInRange(briefingYear,briefingMonth,d,start,end)) el.classList.add('is-highlight');
      el.textContent = d;
      el.style.gridRow = '1';
      el.style.gridColumn = String(d+1);
      grid.appendChild(el);
    }

    const monthLabel = document.createElement('div');
    monthLabel.className = 'cal-corner';
    monthLabel.style.gridColumn = '1';
    monthLabel.style.gridRow = `2 / span ${1 + rowCount}`;
    monthLabel.style.fontSize = '18px';
    monthLabel.style.fontWeight = '700';
    monthLabel.style.color = '#f5f2ea';
    monthLabel.textContent = `${briefingMonth+1}월`;
    grid.appendChild(monthLabel);

    for (let d = 1; d <= days; d++){
      const wd = weekdayOf(briefingYear,briefingMonth,d);
      const el = document.createElement('div');
      el.className = 'cal-weekday';
      if (wd === 0) el.classList.add('is-sun');
      if (wd === 6) el.classList.add('is-sat');
      if (isTodayDay(briefingYear,briefingMonth,d)) el.classList.add('is-today');
      else if (isInRange(briefingYear,briefingMonth,d,start,end)) el.classList.add('is-highlight');
      el.textContent = WEEKDAYS_KR[wd];
      el.style.gridRow = '2';
      el.style.gridColumn = String(d+1);
      grid.appendChild(el);
    }

    for (let r = 0; r < rowCount; r++){
      for (let d = 1; d <= days; d++){
        const bg = document.createElement('div');
        bg.className = 'cal-bg';
        const wd = weekdayOf(briefingYear,briefingMonth,d);
        if (wd === 0) bg.classList.add('is-sunday');
        else if (wd === 6) bg.classList.add('is-weekend');
        if (isInRange(briefingYear,briefingMonth,d,start,end)) bg.classList.add('is-highlight');
        bg.style.gridRow = String(3 + r);
        bg.style.gridColumn = String(d+1);
        grid.appendChild(bg);
      }
    }

    ordered.forEach(t => {
      const bar = document.createElement('div');
      bar.className = 'cal-task-bar';
      if (taskOverlapsRange(t, briefingYear, briefingMonth, start, end)) bar.classList.add('is-highlight-task');
      if (t.color){
        bar.classList.add('has-custom-color');
        bar.style.background = '#' + t.color;
        const textColor = contrastTextColor(t.color);
        if (textColor) bar.style.color = textColor;
      }
      bar.textContent = t.title || '(제목 없음)';
      bar.title = `${t.title || '(제목 없음)'}${t.notes ? '\n\n' + t.notes : ''}\n(클릭해서 상세 보기)`;
      bar.style.gridRow = String(3 + t._row);
      bar.style.gridColumn = `${t.start+1} / ${t.end+2}`;
      bar.addEventListener('click', () => openTaskModal(t, briefingYear, briefingMonth));
      grid.appendChild(bar);
    });
  }

  function renderBriefingWeekList(){
    const listEl = document.getElementById('briefing-week-list');
    listEl.innerHTML = '';
    const {start, end} = getBriefingWeekRange();
    const results = getTasksOverlappingRange(start, end);

    if (results.length === 0){
      const empty = document.createElement('div');
      empty.className = 'briefing-week-empty';
      empty.textContent = '— 해당 주에 예정된 업무 없음 —';
      listEl.appendChild(empty);
      return;
    }

    // 5개 요일 버킷 (월~금) — effStart 기준
    const buckets = [[], [], [], [], []];
    results.forEach(r => {
      const taskStart = new Date(r.y, r.m, r.task.start);
      const effStart = taskStart > start ? taskStart : start;
      const diffMs = effStart - start;
      const dayIdx = Math.max(0, Math.min(4, Math.floor(diffMs / 86400000)));
      buckets[dayIdx].push(r);
    });

    const DAY_FULL = ['월요일','화요일','수요일','목요일','금요일'];
    for (let i = 0; i < 5; i++){
      const dayDate = addDays(start, i);
      const section = document.createElement('div');
      section.className = 'briefing-day-section';

      const header = document.createElement('div');
      header.className = 'briefing-day-header';
      header.innerHTML = `<span class="briefing-day-name">${DAY_FULL[i]}</span><span class="briefing-day-date">${dayDate.getMonth()+1}/${dayDate.getDate()}</span>`;
      section.appendChild(header);

      const tasksWrap = document.createElement('div');
      tasksWrap.className = 'briefing-day-tasks';

      if (buckets[i].length === 0){
        const empty = document.createElement('div');
        empty.className = 'briefing-day-empty';
        empty.textContent = '(예정 업무 없음)';
        tasksWrap.appendChild(empty);
      } else {
        buckets[i].forEach(({ task: t, y, m }) => {
          const card = document.createElement('div');
          card.className = 'briefing-task-card';
          if (t.color) card.style.setProperty('--card-color', '#' + t.color);
          card.title = '클릭해서 상세 보기';

          const taskStart = new Date(y, m, t.start);
          const taskEnd = new Date(y, m, t.end);
          const effStart = taskStart > start ? taskStart : start;
          const effEnd = taskEnd < end ? taskEnd : end;
          const sameDay = fmtISO(effStart) === fmtISO(effEnd);
          const dateStr = sameDay
            ? `${effStart.getMonth()+1}/${effStart.getDate()}(${WEEKDAYS_KR[effStart.getDay()]})`
            : `${effStart.getMonth()+1}/${effStart.getDate()}(${WEEKDAYS_KR[effStart.getDay()]}) — ${effEnd.getMonth()+1}/${effEnd.getDate()}(${WEEKDAYS_KR[effEnd.getDay()]})`;

          const notesOneLine = t.notes ? t.notes.replace(/\s+/g, ' ').trim() : '';

          card.innerHTML = `
            <div class="briefing-task-title">${escapeHtml(t.title) || '(제목 없음)'}</div>
            <div class="briefing-task-meta">
              <span class="briefing-task-dates">${dateStr}</span>
              ${notesOneLine ? `<span class="briefing-task-notes">${escapeHtml(notesOneLine)}</span>` : ''}
            </div>
          `;
          card.addEventListener('click', () => openTaskModal(t, y, m));
          tasksWrap.appendChild(card);
        });
      }

      section.appendChild(tasksWrap);
      listEl.appendChild(section);
    }
  }

  function updateModalDatesDisplay(){

    const { y, m } = modalCtx;
    const s = parseInt(document.getElementById('modal-start-input').value, 10);
    const e = parseInt(document.getElementById('modal-end-input').value, 10);
    if (!Number.isFinite(s) || !Number.isFinite(e)) return;
    const sd = new Date(y, m, s);
    const ed = new Date(y, m, e);
    const display = s === e
      ? `${m+1}/${s} (${WEEKDAYS_KR[sd.getDay()]})`
      : `${m+1}/${s}(${WEEKDAYS_KR[sd.getDay()]}) - ${m+1}/${e}(${WEEKDAYS_KR[ed.getDay()]})`;
    document.getElementById('modal-dates-display').textContent = display;

  // 범용 스와치 렌더러 — swatchesElId/customInputId를 받아 월간/연간 모두 지원
  function renderColorSwatches(swatchesElId, customInputId, currentColor){
    const wrap = document.getElementById(swatchesElId);
    if (!wrap) return;
    wrap.innerHTML = '';
    const noneBtn = document.createElement('button');
    noneBtn.type = 'button';
    noneBtn.className = 'color-swatch is-none' + (!currentColor ? ' is-active' : '');
    noneBtn.title = '색 없음';
    noneBtn.dataset.color = '';
    noneBtn.setAttribute('role', 'radio');
    noneBtn.setAttribute('aria-checked', String(!currentColor));
    wrap.appendChild(noneBtn);
    ANNUAL_COLOR_PRESETS.forEach(p => {
      const btn = document.createElement('button');
      btn.type = 'button';
      btn.className = 'color-swatch' + (currentColor === p.hex ? ' is-active' : '');
      btn.style.background = '#' + p.hex;
      btn.title = `${p.label} (#${p.hex})`;
      btn.dataset.color = p.hex;
      btn.setAttribute('role', 'radio');
      btn.setAttribute('aria-checked', String(currentColor === p.hex));
      wrap.appendChild(btn);
    });
    const customInput = document.getElementById(customInputId);
    if (customInput){
      const isPreset = !currentColor || ANNUAL_COLOR_PRESETS.some(p => p.hex === currentColor);
      customInput.value = '#' + (currentColor && !isPreset ? currentColor : '8B4513');
    }
  }

  function weekToMonthWeek(annual, week){
    for (const mw of annual.monthWeeks){
      if (week >= mw.startCol && week <= mw.endCol){
        return { month: mw.month, weekInMonth: week - mw.startCol + 1 };
      }
    }
    return null;
  }
  function monthWeekToWeek(annual, month, weekInMonth){
    const mw = annual.monthWeeks.find(x => x.month === month);
    if (!mw) return null;
    const clamped = Math.max(1, Math.min(mw.weekCount, weekInMonth));
    return mw.startCol + clamped - 1;
  }

  function populateMonthSelect(selEl, annual){
    selEl.innerHTML = '';
    annual.monthWeeks.forEach(mw => {
      const opt = document.createElement('option');
      opt.value = String(mw.month);
      opt.textContent = `${mw.month}월`;
      selEl.appendChild(opt);
    });
  }
  function populateWeekSelect(selEl, annual, month){
    selEl.innerHTML = '';
    const mw = annual.monthWeeks.find(x => x.month === month);
    if (!mw) return;
    for (let w = 1; w <= mw.weekCount; w++){
      const opt = document.createElement('option');
      opt.value = String(w);
      opt.textContent = `${w}주`;
      selEl.appendChild(opt);
    }
  }

    const sw = parseInt(document.getElementById('annual-modal-start-week').value, 10);

    const sWeek = monthWeekToWeek(annual, sm, sw);
    const eWeek = monthWeekToWeek(annual, em, ew);
    if (sWeek == null || eWeek == null) return;
    const span = Math.max(0, eWeek - sWeek + 1);
    document.getElementById('annual-modal-dates-display').textContent = `${sm}월 ${sw}주 — ${em}월 ${ew}주 · 총 ${span}주`;

    const { project, bar } = annualModalCtx;
    const titleSnippet = bar.title ? `"${bar.title}"` : '(제목 없는) 바';
    if (!confirm(`${titleSnippet}를 삭제하시겠습니까?`)) return;
    const idx = project.bars.findIndex(b => b.id === bar.id);
    if (idx >= 0) project.bars.splice(idx, 1);
    focusedBarId = null;
    saveAnnualLocal();
    closeAnnualBarModal();
    if (currentView === 'annual') renderAnnual();
  });
  document.getElementById('annual-bar-modal').addEventListener('click', (e) => {
    if (e.target.id === 'annual-bar-modal') closeAnnualBarModal();
  });

  // ---------- Annual View (Sheet1) ----------
  function setView(kind){
    currentView = (kind === 'annual') ? 'annual' : 'monthly';
    document.getElementById('monthly-panel').hidden = (currentView !== 'monthly');
    document.getElementById('annual-panel').hidden = (currentView !== 'annual');
    document.querySelectorAll('.view-tab').forEach(b => {
      const active = b.dataset.view === currentView;
      b.classList.toggle('is-active', active);
      b.setAttribute('aria-selected', String(active));
    });
    try{ localStorage.setItem(VIEW_KEY, currentView); }catch(e){}
    if (currentView === 'annual') renderAnnual();
  }

  function changeAnnualYear(delta){
    currentAnnualYear = currentAnnualYear + delta;
    focusedBarId = null;
    try{ localStorage.setItem(ANNUAL_YEAR_KEY, String(currentAnnualYear)); }catch(e){}
    renderAnnual();
  }

  function resetAnnualYear(){
    currentAnnualYear = new Date().getFullYear();
    focusedBarId = null;
    try{ localStorage.setItem(ANNUAL_YEAR_KEY, String(currentAnnualYear)); }catch(e){}
    renderAnnual();
  }

  function addAnnualProjectRow(){
    const annual = getOrCreateAnnual(currentAnnualYear);
    const nextIndex = annual.projects.length > 0
      ? Math.max(...annual.projects.map(p => p.rowIndex || 0)) + 1
      : 1;
    // 기본 바 1개 생성 (현재 주를 기준으로 4주)
    const startWeek = 1;
    const endWeek = Math.min(annual.totalWeeks || 52, 4);
    const newBar = { id: barUid(), startWeek, endWeek, title: '', notes: '' };
    const newProject = { id: projUid(), rowIndex: nextIndex, bars: [newBar] };
    annual.projects.push(newProject);
    saveAnnualLocal();
    renderAnnual();
    openAnnualBarModal(newProject.id, newBar.id);
  }

  function deleteAnnualProjectRow(projectId){
    const annual = getOrCreateAnnual(currentAnnualYear);
    const idx = annual.projects.findIndex(p => p.id === projectId);
    if (idx < 0) return;
    const p = annual.projects[idx];
    const barCount = (p.bars || []).length;
    const msg = barCount > 0
      ? `프로젝트 행 ${p.rowIndex}을(를) 삭제하시겠습니까? (바 ${barCount}개 포함)`
      : `프로젝트 행 ${p.rowIndex}을(를) 삭제하시겠습니까?`;
    if (!confirm(msg)) return;
    annual.projects.splice(idx, 1);
    // 뒤 행 rowIndex 재번호
    annual.projects.forEach((pp, i) => { pp.rowIndex = i + 1; });
    saveAnnualLocal();
    renderAnnual();
  }

  function addBarToProject(projectId, startWeek){
    const annual = getOrCreateAnnual(currentAnnualYear);
    const project = annual.projects.find(p => p.id === projectId);
    if (!project) return;
    const sw = Math.max(1, Math.min(annual.totalWeeks, startWeek));
    const ew = Math.min(annual.totalWeeks, sw + 3);
    const newBar = { id: barUid(), startWeek: sw, endWeek: ew, title: '', notes: '' };
    project.bars.push(newBar);
    saveAnnualLocal();
    renderAnnual();
    openAnnualBarModal(project.id, newBar.id);
  }

  function renderAnnual(){
    const annual = getOrCreateAnnual(currentAnnualYear);
    document.getElementById('annual-title').textContent = annual.title || `${currentAnnualYear}년 연구 개발 계획`;
    renderAnnualGrid(annual);
  }

  function renderAnnualGrid(annual){
    const body = document.getElementById('annual-body');
    body.innerHTML = '';

    if (!annual.projects || annual.projects.length === 0){
      const wrap = document.createElement('div');
      wrap.className = 'annual-wrap';
      const empty = document.createElement('div');
      empty.className = 'annual-empty';
      empty.innerHTML = `<strong>${escapeHtml(String(currentAnnualYear))}년 연간 계획서가 비어있습니다</strong><br>아래 <kbd>+ 프로젝트 행 추가</kbd> 버튼으로 시작하세요.<br><span style="font-size:12px">※ 또는 Sheet1이 있는 엑셀 파일을 연결하면 자동으로 불러옵니다.</span>`;
      wrap.appendChild(empty);
      body.appendChild(wrap);
      return;
    }

    const wrap = document.createElement('div');
    wrap.className = 'annual-wrap';
    const grid = document.createElement('div');
    grid.className = 'annual-grid';
    grid.id = 'annual-grid';

    const totalWeeks = annual.totalWeeks || 52;
    grid.style.gridTemplateColumns = `120px repeat(${totalWeeks}, minmax(24px, 1fr))`;
    const rowCount = annual.projects.length;
    grid.style.gridTemplateRows = `auto auto auto repeat(${rowCount}, 44px)`;

    // Row 1 corner (spans rows 1-3)
    const corner = document.createElement('div');
    corner.className = 'annual-corner';
    corner.textContent = '행';
    grid.appendChild(corner);

    // Row 1: 월 레이블 (병합된 그리드 셀로 표현)
    annual.monthWeeks.forEach((mw, idx) => {
      const cell = document.createElement('div');
      cell.className = 'annual-month-cell';
      if (idx % 2 === 1) cell.style.background = '#efe6d0';
      cell.textContent = `${mw.month}월`;
      cell.style.gridRow = '1';
      cell.style.gridColumn = `${mw.startCol + 1} / ${mw.endCol + 2}`;
      grid.appendChild(cell);
    });

    // Row 2: 월 내 주 번호
    annual.monthWeeks.forEach(mw => {
      for (let w = 1; w <= mw.weekCount; w++){
        const cell = document.createElement('div');
        cell.className = 'annual-weekinmonth';
        cell.textContent = w;
        cell.style.gridRow = '2';
        cell.style.gridColumn = String(mw.startCol + w);
        grid.appendChild(cell);
      }
    });

    // Row 3: 연속 주 번호
    for (let w = 1; w <= totalWeeks; w++){
      const cell = document.createElement('div');
      cell.className = 'annual-weeknum';
      cell.textContent = w;
      cell.style.gridRow = '3';
      cell.style.gridColumn = String(w + 1);
      grid.appendChild(cell);
    }

    // Row 4+: 프로젝트 행
    annual.projects.forEach((p, pi) => {
      const rowNum = 4 + pi;

      // 왼쪽 행 라벨 + 삭제 버튼
      const label = document.createElement('div');
      label.className = 'annual-rowlabel';
      label.innerHTML = `<span>${escapeHtml(String(p.rowIndex))}</span><button class="row-remove" data-pid="${escapeAttr(p.id)}" title="이 행 삭제">×</button>`;
      label.style.gridRow = String(rowNum);
      label.style.gridColumn = '1';
      label.querySelector('.row-remove').addEventListener('click', (ev) => {
        ev.stopPropagation();
        deleteAnnualProjectRow(p.id);
      });
      grid.appendChild(label);

      // 배경 셀 — 더블클릭으로 새 바 추가
      for (let w = 1; w <= totalWeeks; w++){
        const bg = document.createElement('div');
        bg.className = 'annual-bg';
        const mw = annual.monthWeeks.find(x => w >= x.startCol && w <= x.endCol);
        if (mw && mw.month % 2 === 0) bg.classList.add('is-month-even');
        bg.style.gridRow = String(rowNum);
        bg.style.gridColumn = String(w + 1);
        bg.dataset.pid = p.id;
        bg.dataset.week = String(w);
        bg.title = '더블클릭으로 이 주에 새 업무 추가';
        bg.addEventListener('dblclick', () => addBarToProject(p.id, w));
        grid.appendChild(bg);
      }

      // 바
      (p.bars || []).forEach(bar => {
        const sw = Math.max(1, Math.min(totalWeeks, bar.startWeek));
        const ew = Math.max(sw, Math.min(totalWeeks, bar.endWeek));
        const el = document.createElement('div');
        el.className = 'annual-bar';
        if (bar.id === focusedBarId) el.classList.add('is-focused');
        // 원본 엑셀의 색상 복원
        if (bar.color){
          el.style.background = '#' + bar.color;
          const textColor = contrastTextColor(bar.color);
          if (textColor) el.style.color = textColor;
          el.classList.add('has-custom-color');
        }
        const titleStr = bar.title || '(제목 없음)';
        el.textContent = titleStr;
        const mwStart = annual.monthWeeks.find(x => sw >= x.startCol && sw <= x.endCol);
        const mwEnd = annual.monthWeeks.find(x => ew >= x.startCol && ew <= x.endCol);
        const startLabel = mwStart ? `${mwStart.month}월 ${sw - mwStart.startCol + 1}주` : `${sw}주`;
        const endLabel = mwEnd ? `${mwEnd.month}월 ${ew - mwEnd.startCol + 1}주` : `${ew}주`;
        el.title = `${titleStr}\n${startLabel} ~ ${endLabel}${bar.notes ? '\n\n' + bar.notes : ''}\n(클릭해서 상세 보기)`;
        el.style.gridRow = String(rowNum);
        el.style.gridColumn = `${sw + 1} / ${ew + 2}`;
        el.dataset.pid = p.id;
        el.dataset.bid = bar.id;
        el.addEventListener('click', () => openAnnualBarModal(p.id, bar.id));
        grid.appendChild(el);
      });
    });

    wrap.appendChild(grid);
    body.appendChild(wrap);
  }

  // ---------- Wiring ----------
  function changeMonth(delta){
    const d = new Date(currentYear, currentMonth + delta, 1);
    currentYear = d.getFullYear();
    currentMonth = d.getMonth();
    focusedTaskId = null;
    renderMonthHeader(); renderCalendar();
    if (allSectionOpen) renderAllTasks();
  }
  function changeBriefingMonth(delta){
    const d = new Date(briefingYear, briefingMonth + delta, 1);
    briefingYear = d.getFullYear();
    briefingMonth = d.getMonth();
    renderBriefing();
  }

  document.getElementById('prev-month').addEventListener('click', () => changeMonth(-1));
  document.getElementById('next-month').addEventListener('click', () => changeMonth(1));
  document.getElementById('reset-month').addEventListener('click', () => {
    currentYear = todayY; currentMonth = todayM; focusedTaskId = null;
    renderMonthHeader(); renderCalendar();
    if (allSectionOpen) renderAllTasks();
  });
  document.getElementById('add-task-btn').addEventListener('click', addTaskToCurrentMonth);
  document.getElementById('add-tw-task-btn').addEventListener('click', addThisWeekTask);
  document.getElementById('all-toggle').addEventListener('click', () => toggleAllSection());
  document.getElementById('tw-collapse-btn').addEventListener('click', () => setTwCollapsed(!twCollapsed));
  function setTwCollapsed(collapsed){
    twCollapsed = collapsed;
    const section = document.getElementById('tw-section');
    section.classList.toggle('is-collapsed', collapsed);
    const btn = document.getElementById('tw-collapse-btn');
    btn.setAttribute('aria-expanded', String(!collapsed));
    const label = document.getElementById('tw-collapse-label');
    if (label) label.textContent = collapsed ? '펼치기' : '접기';
    // 접을 때 편집 모드였던 항목 정리
    if (collapsed) editingTwIds.clear();
  }

  document.getElementById('btn-briefing').addEventListener('click', enterBriefing);
  document.getElementById('btn-exit').addEventListener('click', exitBriefing);
  document.getElementById('btn-connect').addEventListener('click', connectExcelFile);
  document.getElementById('btn-save').addEventListener('click', saveToConnectedFile);
  document.getElementById('btn-export-new').addEventListener('click', exportAsNewFile);

  // Sheet tab switching
  document.querySelectorAll('.view-tab').forEach(btn => {
    btn.addEventListener('click', () => setView(btn.dataset.view));
  });
  // Annual year navigation
  document.getElementById('a-prev-year').addEventListener('click', () => changeAnnualYear(-1));
  document.getElementById('a-next-year').addEventListener('click', () => changeAnnualYear(1));
  document.getElementById('a-reset-year').addEventListener('click', resetAnnualYear);
  document.getElementById('add-annual-row-btn').addEventListener('click', addAnnualProjectRow);
  document.getElementById('b-prev-month').addEventListener('click', () => changeBriefingMonth(-1));
  document.getElementById('b-next-month').addEventListener('click', () => changeBriefingMonth(1));
  document.querySelectorAll('.week-toggle-btn').forEach(btn => {
    btn.addEventListener('click', () => setBriefingWeek(btn.dataset.week));
  });
  document.querySelectorAll('.tw-week-toggle-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      twSelectedWeek = btn.dataset.twWeek;
      editingTwIds.clear();
      document.querySelectorAll('.tw-week-toggle-btn').forEach(b => {
        b.classList.toggle('is-active', b.dataset.twWeek === twSelectedWeek);
      });
      renderMonthHeader();
      renderThisWeek();
    });
  });

  const w = loadWriter();
  document.getElementById('writer-name').value = w.name || '';
  document.getElementById('writer-dept').value = w.dept || '기술연구소';
  document.getElementById('writer-name').addEventListener('input', saveWriter);
  document.getElementById('writer-dept').addEventListener('input', saveWriter);

  // Keyboard shortcuts
  document.addEventListener('keydown', (e) => {
    // Ctrl/Cmd + S : save
    if ((e.ctrlKey || e.metaKey) && e.key === 's'){
      e.preventDefault();
      if (fileHandle && FS_API_SUPPORTED) saveToConnectedFile();
      else if (FS_API_SUPPORTED) showToast('먼저 📂 엑셀 파일 연결을 해주세요', 'error');
      return;
    }
    // Modal open: ESC closes modal (takes priority over other handlers)
    if (document.getElementById('task-modal').classList.contains('is-open')){
      if (e.key === 'Escape') closeTaskModal();
      return;
    }
    if (document.getElementById('annual-bar-modal').classList.contains('is-open')){
      if (e.key === 'Escape') closeAnnualBarModal();
      return;
    }
    // Briefing view only
    if (document.getElementById('briefing-view').hidden) return;
    if (e.key === 'Escape') exitBriefing();
    else if (e.key === 'ArrowLeft' && !e.shiftKey) setBriefingWeek('last');
    else if (e.key === 'ArrowRight' && !e.shiftKey) setBriefingWeek('this');
  });

  // Warn before leaving if unsaved
  window.addEventListener('beforeunload', (e) => {
    if (isDirty && fileHandle){
      e.preventDefault();
      e.returnValue = '';
    }
  });

  renderMonthHeader();
  renderCalendar();
  renderThisWeek();
  setTwCollapsed(true); // 기본 접힘 상태로 시작
  setView(currentView); // 마지막으로 본 시트 탭 복원
  restoreFileHandle();
})();
</script>
</body>
</html>
