  // 캘린더에 표시할 날짜 배열 생성 — 펼치기 모드면 전후 7일씩 추가
  const MS_PER_DAY = 86400000;
  function buildCalendarDates(){
    const days = daysInMonth(currentYear, currentMonth);
    const PRE = calendarExpanded ? 7 : 0;
    const POST = calendarExpanded ? 7 : 0;
    const start = addDays(new Date(currentYear, currentMonth, 1), -PRE);
    start.setHours(0,0,0,0);
    const total = PRE + days + POST;
    const arr = [];
    for (let i = 0; i < total; i++){
      const dt = addDays(start, i); dt.setHours(0,0,0,0);
      arr.push({
        y: dt.getFullYear(), m: dt.getMonth(), d: dt.getDate(),
        weekday: dt.getDay(), date: dt,
        isCurrentMonth: (dt.getFullYear() === currentYear && dt.getMonth() === currentMonth)
      });
    }
    return arr;
  }
  function dateColIndex(dates, dt){
    if (!dates.length) return -1;
    const x = new Date(dt); x.setHours(0,0,0,0);
    return Math.round((x - dates[0].date) / MS_PER_DAY);
  }
  // 펼치기 모드: range에 걸친 모든 task 조각을 groupId 단위로 합쳐 하나의 가상 task로 반환
  function collectExpandedTasks(rangeStart, rangeEnd){
    const monthsToCheck = new Set();
    let cur = new Date(rangeStart.getFullYear(), rangeStart.getMonth(), 1);
    const last = new Date(rangeEnd.getFullYear(), rangeEnd.getMonth(), 1);
    while (cur <= last){
      monthsToCheck.add(monthKey(cur.getFullYear(), cur.getMonth()));
      cur.setMonth(cur.getMonth() + 1);
    }
    const groups = new Map();
    monthsToCheck.forEach(key => {
      if (!monthData[key]) return;
      const parts = key.split('-');
      const y = parseInt(parts[0],10);
      const m = parseInt(parts[1],10) - 1;
      monthData[key].tasks.forEach(t => {
        if (!taskOverlapsRange(t,y,m,rangeStart,rangeEnd)) return;
        const ts = new Date(y, m, t.start); ts.setHours(0,0,0,0);
        const te = new Date(y, m, t.end);   te.setHours(0,0,0,0);
        const gkey = t.groupId || t.id;
        if (!groups.has(gkey)){
          groups.set(gkey, { task:t, startDate:ts, endDate:te, y, m });
        } else {
          const g = groups.get(gkey);
          if (ts < g.startDate){ g.startDate = ts; g.task = t; g.y = y; g.m = m; }
          if (te > g.endDate){ g.endDate = te; }
        }
      });
    });
    return Array.from(groups.values());
  }

  // 캘린더 바 hover 툴팁 — body 직속 singleton (calendar-wrap의 overflow clipping을 우회)
  const calTipEl = document.createElement('div');
  calTipEl.className = 'cal-tip';
  document.body.appendChild(calTipEl);
  function showCalTip(bar){
    const tip = bar.dataset.tip || '';
    if (!tip) return;
    calTipEl.textContent = tip;
    calTipEl.classList.add('is-visible');
    positionCalTip(bar);
  }
  function hideCalTip(){
    calTipEl.classList.remove('is-visible');
  }
  function positionCalTip(bar){
    const rect = bar.getBoundingClientRect();
    const tipRect = calTipEl.getBoundingClientRect();
    const margin = 8;
    let x = rect.left + rect.width / 2 - tipRect.width / 2;
    if (x < margin) x = margin;
    if (x + tipRect.width > window.innerWidth - margin) x = window.innerWidth - tipRect.width - margin;
    const spaceAbove = rect.top;
    const spaceBelow = window.innerHeight - rect.bottom;
    let y;
    if (tipRect.height + margin <= spaceAbove) y = rect.top - tipRect.height - margin;
    else if (tipRect.height + margin <= spaceBelow) y = rect.bottom + margin;
    else if (spaceAbove >= spaceBelow) y = margin;
    else y = window.innerHeight - tipRect.height - margin;
    calTipEl.style.left = x + 'px';
    calTipEl.style.top = y + 'px';
  }

  function renderCalendar(opts = {}){
    const grid = document.getElementById('calendar');
    // 사용자가 보고 있던 가로 스크롤 위치를 보존 — 단, opts.scrollToThisWeek=true면 무시
    const wrapEl = document.querySelector('.calendar-wrap');
    const prevScroll = wrapEl ? wrapEl.scrollLeft : 0;
    const dates = buildCalendarDates();
    const total = dates.length;
    const rangeStart = dates[0].date;
    const rangeEnd = dates[total-1].date;

    // task → 컬럼 매핑
    const calTasks = [];
    if (calendarExpanded){
      const groups = collectExpandedTasks(rangeStart, rangeEnd);
      groups.forEach(({task, startDate, endDate, y, m}) => {
        const sCol = Math.max(0, dateColIndex(dates, startDate));
        const eCol = Math.min(total - 1, dateColIndex(dates, endDate));
        if (eCol < 0 || sCol > total - 1) return;
        calTasks.push({
          ...task, _startCol:sCol, _endCol:eCol, _origY:y, _origM:m,
          _clippedStart: startDate < rangeStart, _clippedEnd: endDate > rangeEnd
        });
      });
    } else {
      // 기본 모드: 현재 달의 task만, _startCol = start-1
      getMonth(currentYear, currentMonth).tasks.forEach(t => {
        calTasks.push({
          ...t, _startCol:t.start-1, _endCol:t.end-1,
          _origY:currentYear, _origM:currentMonth,
          _clippedStart:false, _clippedEnd:false
        });
      });
    }
    // 컬럼 기반 행 배치
    calTasks.sort((a,b) => a._startCol - b._startCol || a._endCol - b._endCol);
    const rows = [];
    calTasks.forEach(t => {
      let placed = false;
      for (let i = 0; i < rows.length; i++){
        if (rows[i] < t._startCol){ t._row = i; rows[i] = t._endCol; placed = true; break; }
      }
      if (!placed){ t._row = rows.length; rows.push(t._endCol); }
    });
    const rowCount = Math.max(1, rows.length);

    const dayCol = calendarExpanded ? `${CAL_EXPANDED_DAY_WIDTH}px` : 'minmax(26px, 1fr)';
    grid.style.gridTemplateColumns = `56px repeat(${total}, ${dayCol})`;
    grid.style.gridTemplateRows = `auto auto repeat(${rowCount}, auto)`;
    grid.classList.toggle('is-expanded', calendarExpanded);
    grid.innerHTML = '';

    const corner = document.createElement('div');
    corner.className = 'cal-corner';
    corner.textContent = `   일\n달`;
    grid.appendChild(corner);

    // 일자 헤더
    dates.forEach((meta, i) => {
      const el = document.createElement('div');
      el.className = 'cal-day-num';
      if (isTodayDay(meta.y, meta.m, meta.d)) el.classList.add('is-today');
      else if (isInRange(meta.y, meta.m, meta.d, thisMon, thisFri)) el.classList.add('is-highlight');
      if (!meta.isCurrentMonth) el.classList.add('is-other-month');
      if (!meta.isCurrentMonth && meta.d === 1){
        el.classList.add('is-month-start');
        el.setAttribute('data-month', `${meta.m+1}월`);
      }
      el.textContent = meta.d;
      el.style.gridRow = '1';
      el.style.gridColumn = String(i + 2);
      grid.appendChild(el);
    });

    // 좌측 월 라벨 (현재 달 표시)
    const monthLabel = document.createElement('div');
    monthLabel.className = 'cal-corner';
    monthLabel.style.gridColumn = '1';
    monthLabel.style.gridRow = `2 / span ${1 + rowCount}`;
    monthLabel.style.fontSize = '15px';
    monthLabel.style.fontWeight = '700';
    monthLabel.style.color = 'var(--ink)';
    monthLabel.style.whiteSpace = 'normal';
    monthLabel.textContent = `${currentMonth+1}월`;
    grid.appendChild(monthLabel);

    // 요일 헤더
    dates.forEach((meta, i) => {
      const el = document.createElement('div');
      el.className = 'cal-weekday';
      if (meta.weekday === 0) el.classList.add('is-sun');
      if (meta.weekday === 6) el.classList.add('is-sat');
      if (isTodayDay(meta.y, meta.m, meta.d)) el.classList.add('is-today');
      else if (isInRange(meta.y, meta.m, meta.d, thisMon, thisFri)) el.classList.add('is-highlight');
      if (!meta.isCurrentMonth) el.classList.add('is-other-month');
      el.textContent = WEEKDAYS_KR[meta.weekday];
      el.style.gridRow = '2';
      el.style.gridColumn = String(i + 2);
      grid.appendChild(el);
    });

    // 배경 셀
    for (let r = 0; r < rowCount; r++){
      dates.forEach((meta, i) => {
        const bg = document.createElement('div');
        bg.className = 'cal-bg';
        if (meta.weekday === 0) bg.classList.add('is-sunday');
        else if (meta.weekday === 6) bg.classList.add('is-weekend');
        if (isInRange(meta.y, meta.m, meta.d, thisMon, thisFri)) bg.classList.add('is-highlight');
        if (!meta.isCurrentMonth) bg.classList.add('is-other-month');
        bg.style.gridRow = String(3 + r);
        bg.style.gridColumn = String(i + 2);
        grid.appendChild(bg);
      });
    }

    // task 바
    calTasks.forEach(t => {
      const bar = document.createElement('div');
      bar.className = 'cal-task-bar';
      if (t.id === focusedTaskId) bar.classList.add('is-focused');
      if (t.done) bar.classList.add('is-done');
      if (t.color){
        bar.classList.add('has-custom-color');
        bar.style.background = '#' + t.color;
        const textColor = contrastTextColor(t.color);
        if (textColor) bar.style.color = textColor;
      }
      // 캘린더 바에는 체크박스 없음 — 완료 토글은 리스트/모달에서만. 시각 효과(취소선/회색)는 is-done 클래스로 표시.
      const titleStr = t.title || '(제목 없음)';
      const textSpan = document.createElement('span');
      textSpan.className = 'cal-task-text';
      textSpan.textContent = titleStr;
      bar.replaceChildren(textSpan);
      bar.dataset.tip = `${titleStr}${t.done ? ' [완료]' : ''}\n${t._origM+1}/${t.start} ~ ${t._origM+1}/${t.end}${t.notes ? '\n\n' + t.notes : ''}`;
      bar.style.gridRow = String(3 + t._row);
      bar.style.gridColumn = `${t._startCol + 2} / ${t._endCol + 3}`;
      bar.addEventListener('click', () => {
        focusedTaskId = t.id;
        renderCalendar();
        openTaskModal(t, t._origY, t._origM);
      });
      bar.addEventListener('mouseenter', () => showCalTip(bar));
      bar.addEventListener('mouseleave', hideCalTip);
      grid.appendChild(bar);
    });

    // 명시적으로 요청한 경우(월 변경, 펼치기 토글 ON)에만 이번주로 자동 스크롤.
    // 그 외(task 클릭, 완료 토글, 인라인 편집 등)는 사용자가 보던 위치를 그대로 보존.
    if (opts.scrollToThisWeek){
      requestAnimationFrame(scrollToThisWeek);
    } else if (calendarExpanded && wrapEl){
      requestAnimationFrame(() => { wrapEl.scrollLeft = prevScroll; });
    }
  }

  function scrollToThisWeek(){
    if (!calendarExpanded) return;
    const wrap = document.querySelector('.calendar-wrap');
    const grid = document.getElementById('calendar');
    if (!wrap || !grid) return;
    // 캘린더에서 이번주 첫 셀(.cal-day-num.is-highlight) 위치로 스크롤
    const firstHighlight = grid.querySelector('.cal-day-num.is-highlight, .cal-day-num.is-today');
    if (!firstHighlight) return;
    wrap.scrollLeft = Math.max(0, firstHighlight.offsetLeft - 60);
  }

  function getTasksOverlappingRange(rangeStart, rangeEnd){
    const results = [];
    const monthsToCheck = new Set([
      monthKey(rangeStart.getFullYear(), rangeStart.getMonth()),
      monthKey(rangeEnd.getFullYear(), rangeEnd.getMonth())
    ]);
    monthsToCheck.forEach(key => {
      if (!monthData[key]) return;
      const parts = key.split('-');
      const y = parseInt(parts[0],10);
      const m = parseInt(parts[1],10) - 1;
      monthData[key].tasks.forEach(t => {
        if (taskOverlapsRange(t,y,m,rangeStart,rangeEnd)) results.push({ task:t, y, m, monthKey:key });
      });
    });
    results.sort((a,b) => new Date(a.y,a.m,a.task.start) - new Date(b.y,b.m,b.task.start));
    // 여러 달 걸친 업무(같은 groupId)가 리스트에 여러 번 나오지 않도록 dedupe — 가장 이른 조각만 남김.
    const seen = new Set();
    return results.filter(r => {
      const gkey = r.task.groupId || r.task.id;
      if (seen.has(gkey)) return false;
      seen.add(gkey);
      return true;
    });
  }

  function renderThisWeek(){
    const list = document.getElementById('tw-list');
    const {start, end, label} = getTwRange();
    const rawResults = getTasksOverlappingRange(start, end);
    const results = sortResults(rawResults, twSortField, twSortDir);

    // Update labels / button text that depend on selected week
    document.getElementById('tw-badge').textContent = `${label} 업무`;
    document.getElementById('tw-count').textContent = results.length ? `${results.length}건` : '';
    list.innerHTML = '';

    if (results.length === 0){
      const empty = document.createElement('div');
      empty.className = 'tw-empty';
      empty.textContent = `— ${label} 예정 업무 없음 —`;
      list.appendChild(empty);
      return;
    }

    results.forEach(({ task, y, m, monthKey: mk }) => {
      const item = document.createElement('div');
      item.className = 'tw-item';
      if (editingTwIds.has(task.id)) item.classList.add('is-editing');
      if (task.done) item.classList.add('is-done');
      item.dataset.id = task.id;
      const days = daysInMonth(y, m);
      const startD = new Date(y, m, task.start);
      const endD = new Date(y, m, task.end);
      const sameDay = task.start === task.end;
      const dateStr = sameDay
        ? `${startD.getMonth()+1}/${startD.getDate()}(${WEEKDAYS_KR[startD.getDay()]})`
        : `${startD.getMonth()+1}/${startD.getDate()}(${WEEKDAYS_KR[startD.getDay()]}) - ${endD.getMonth()+1}/${endD.getDate()}(${WEEKDAYS_KR[endD.getDay()]})`;
      item.innerHTML = `
        <span class="done-toggle ${task.done ? 'is-checked' : ''}" role="checkbox" aria-checked="${!!task.done}" tabindex="0" title="${task.done ? '완료 해제' : '완료로 표시'}"></span>
        <input class="tw-title-input" placeholder="업무 내용" value="${escapeAttr(task.title)}">
        <div class="tw-dates-cell">
          <div class="tw-dates">${dateStr}</div>
          <div class="tw-dates-edit">
            <input class="tw-day-input tw-day-start" type="number" min="1" max="${days}" value="${task.start}" aria-label="시작일">
            <span class="tw-dates-sep">-</span>
            <input class="tw-day-input tw-day-end" type="number" min="1" max="${days}" value="${task.end}" aria-label="종료일">
          </div>
        </div>
        <button class="tw-edit" aria-label="수정" title="수정">${editingTwIds.has(task.id) ? '✓' : '✎'}</button>
        <button class="task-remove" aria-label="삭제">×</button>
      `;
      const titleEl = item.querySelector('.tw-title-input');
      const editBtn = item.querySelector('.tw-edit');
      const startInput = item.querySelector('.tw-day-start');
      const endInput = item.querySelector('.tw-day-end');
      const doneToggle = item.querySelector('.done-toggle');
      const removeBtn = item.querySelector('.task-remove');
      doneToggle.addEventListener('click', (e) => { e.stopPropagation(); toggleTaskDone(task); });
      doneToggle.addEventListener('keydown', (e) => {
        if (e.key === ' ' || e.key === 'Enter'){ e.preventDefault(); toggleTaskDone(task); }
      });
      // 완료 상태이면 제목/날짜 편집 + 수정/삭제 버튼 비활성화
      if (task.done){
        titleEl.readOnly = true;
        if (startInput) startInput.disabled = true;
        if (endInput) endInput.disabled = true;
        editBtn.disabled = true;
        editBtn.title = '완료 해제 후 수정 가능';
        removeBtn.disabled = true;
        removeBtn.title = '완료 해제 후 삭제 가능';
      }

      titleEl.addEventListener('input', e => {
        syncTaskTitleInGroup(task, e.target.value);
        saveAllLocal(); renderCalendar();
        if (allSectionOpen && y === currentYear && m === currentMonth){
          const twin = document.querySelector(`.all-section .tw-item[data-id="${task.id}"] .tw-title-input`);
          if (twin && document.activeElement !== twin) twin.value = task.title;
        }
      });
      // Enter → input 포커스 해제만 (값은 input 이벤트로 이미 저장됨)
      titleEl.addEventListener('keydown', e => {
        if (e.key === 'Enter'){
          e.preventDefault();
          titleEl.blur();
        }
      });

      editBtn.addEventListener('click', () => {
        // 인라인 편집 대신 상세 모달 열기 (저장/X로 명시적 처리)
        focusedTaskId = task.id;
        openTaskModal(task, y, m);
      });

      // 편집 모드 종료 (박스 밖 클릭 또는 ✓ 클릭)
      const exitEditMode = () => {
        editingTwIds.delete(task.id);
        // 재렌더로 항목이 사라질 수 있으므로 renderThisWeek로 통째로 다시 그림
        renderThisWeek();
      };

      // 박스 밖을 클릭했을 때 자동 종료
      item.addEventListener('focusout', () => {
        // 같은 박스 내부로 포커스가 이동한 건지 확인하려고 setTimeout으로 한 틱 지연
        setTimeout(() => {
          if (!editingTwIds.has(task.id)) return; // 이미 종료됨
          if (item.contains(document.activeElement)) return; // 같은 박스 내부 이동
          exitEditMode();
        }, 0);
      });

      const onDayChange = () => {
        let s = parseInt(startInput.value,10);
        let e = parseInt(endInput.value,10);
        if (!Number.isFinite(s)) s = 1;
        if (!Number.isFinite(e)) e = s;
        s = Math.max(1, Math.min(days, s));
        e = Math.max(s, Math.min(days, e));
        task.start = s; task.end = e;
        startInput.value = s; endInput.value = e;
        saveAllLocal();
        renderCalendar();
        // 편집 중에는 tw-list를 재렌더하지 않음 (포커스 손실 방지)
        // 대신 이 항목의 표시 텍스트만 실시간 업데이트 (편집 종료 후 보여줄 값)
        const nsd = new Date(y, m, s);
        const ned = new Date(y, m, e);
        const dStr = s === e
          ? `${nsd.getMonth()+1}/${nsd.getDate()}(${WEEKDAYS_KR[nsd.getDay()]})`
          : `${nsd.getMonth()+1}/${nsd.getDate()}(${WEEKDAYS_KR[nsd.getDay()]}) - ${ned.getMonth()+1}/${ned.getDate()}(${WEEKDAYS_KR[ned.getDay()]})`;
        const datesView = item.querySelector('.tw-dates');
        if (datesView) datesView.textContent = dStr;
        if (allSectionOpen && y === currentYear && m === currentMonth) renderAllTasks();
      };
      startInput.addEventListener('change', onDayChange);
      endInput.addEventListener('change', onDayChange);

      item.querySelector('.task-remove').addEventListener('click', () => {
        removeTaskOrGroup(task); // 여러 달 조각 전체 제거
        editingTwIds.delete(task.id);
        if (focusedTaskId === task.id) focusedTaskId = null;
        saveAllLocal();
        renderCalendar(); renderThisWeek(); renderAllTasks();
      });
      list.appendChild(item);
    });
  }

  function renderAllTasks(){
    const list = document.getElementById('task-list');
    const data = getMonth(currentYear, currentMonth);
    list.innerHTML = '';
    const days = daysInMonth(currentYear, currentMonth);

    document.getElementById('all-count').textContent = data.tasks.length ? `${data.tasks.length}건` : '';

    if (data.tasks.length === 0){
      const empty = document.createElement('div');
      empty.className = 'tw-empty';
      empty.textContent = '— 이번 달 등록된 업무 없음 —';
      list.appendChild(empty);
      return;
    }

    const y = currentYear;
    const m = currentMonth;
    const sorted = sortTasks(data.tasks, allSortField, allSortDir);

    sorted.forEach(task => {
      const item = document.createElement('div');
      item.className = 'tw-item';
      if (task.done) item.classList.add('is-done');
      item.dataset.id = task.id;
      const startD = new Date(y, m, task.start);
      const endD = new Date(y, m, task.end);
      const sameDay = task.start === task.end;
      const dateStr = sameDay
        ? `${startD.getMonth()+1}/${startD.getDate()}(${WEEKDAYS_KR[startD.getDay()]})`
        : `${startD.getMonth()+1}/${startD.getDate()}(${WEEKDAYS_KR[startD.getDay()]}) - ${endD.getMonth()+1}/${endD.getDate()}(${WEEKDAYS_KR[endD.getDay()]})`;
      item.innerHTML = `
        <span class="done-toggle ${task.done ? 'is-checked' : ''}" role="checkbox" aria-checked="${!!task.done}" tabindex="0" title="${task.done ? '완료 해제' : '완료로 표시'}"></span>
        <input class="tw-title-input" placeholder="업무 내용" value="${escapeAttr(task.title)}">
        <div class="tw-dates-cell">
          <div class="tw-dates">${dateStr}</div>
        </div>
        <button class="tw-edit" aria-label="수정" title="수정">✎</button>
        <button class="task-remove" aria-label="삭제">×</button>
      `;
      const titleEl = item.querySelector('.tw-title-input');
      const editBtn = item.querySelector('.tw-edit');
      const doneToggle = item.querySelector('.done-toggle');
      const removeBtn = item.querySelector('.task-remove');
      doneToggle.addEventListener('click', (e) => { e.stopPropagation(); toggleTaskDone(task); });
      doneToggle.addEventListener('keydown', (e) => {
        if (e.key === ' ' || e.key === 'Enter'){ e.preventDefault(); toggleTaskDone(task); }
      });
      // 완료 상태이면 제목 편집 + 수정/삭제 버튼 비활성화
      if (task.done){
        titleEl.readOnly = true;
        editBtn.disabled = true;
        editBtn.title = '완료 해제 후 수정 가능';
        removeBtn.disabled = true;
        removeBtn.title = '완료 해제 후 삭제 가능';
      }

      titleEl.addEventListener('input', e => {
        syncTaskTitleInGroup(task, e.target.value);
        saveAllLocal();
        renderCalendar();
        // 같은 업무가 이번주/다음주 섹션에도 있으면 입력 동기화 (포커스 안 뺏김)
        const {start: twStart, end: twEnd} = getTwRange();
        if (taskOverlapsRange(task, y, m, twStart, twEnd)){
          const twin = document.querySelector(`.tw-section .tw-item[data-id="${task.id}"] .tw-title-input`);
          if (twin && document.activeElement !== twin) twin.value = task.title;
        }
      });

      editBtn.addEventListener('click', () => {
        focusedTaskId = task.id;
        openTaskModal(task, y, m);
      });

      item.querySelector('.task-remove').addEventListener('click', () => {
        removeTaskOrGroup(task); // 여러 달 조각 전체 제거
        editingTwIds.delete(task.id);
        if (focusedTaskId === task.id) focusedTaskId = null;
        saveAllLocal();
        renderCalendar(); renderThisWeek(); renderAllTasks();
      });
      list.appendChild(item);
    });
  }

  function toggleAllSection(open){
    allSectionOpen = typeof open === 'boolean' ? open : !allSectionOpen;
    const section = document.getElementById('all-section');
    section.classList.toggle('is-collapsed', !allSectionOpen);
    const btn = document.getElementById('all-collapse-btn');
    btn.setAttribute('aria-expanded', String(allSectionOpen));
    const label = document.getElementById('all-collapse-label');
    if (label) label.textContent = allSectionOpen ? '접기' : '펼치기';
    if (allSectionOpen) renderAllTasks();
  }

  // 단일 "업무 일지 추가" 버튼 — 기본 날짜는 현재 보고 있는 달 맥락으로 설정,
  // 저장 시 날짜가 이번주/다음주 범위에 들어가면 tw 섹션, 아니면 all 섹션 자동 펼침.
  function addTaskLog(){
    const y = currentYear;
    const m = currentMonth;
    const days = daysInMonth(y, m);
    let start = 1, end = 1;
    if (y === thisMon.getFullYear() && m === thisMon.getMonth()){
      start = thisMon.getDate();
      end = (thisFri.getMonth() === m) ? thisFri.getDate() : days;
    } else if (y === todayY && m === todayM){
      start = todayD; end = todayD;
    }
    const placeholder = { id: uid(), title: '', start, end, notes: '', color: null, done: false };
    openTaskModal(placeholder, y, m, true);
  }

  // ---------- MCE-aware style extraction ----------
  // xlsx-js-style은 <mc:AlternateContent> 내부의 cellXfs를 놓치므로
  // (한컴 등 일부 xlsx 생성기가 이 블록을 다수 씀) 직접 styles.xml·sheet*.xml을
  // 파싱해 셀별 배경색을 복원한다.
  function buildMceStyleMap(arrayBuffer){
    if (typeof fflate === 'undefined') return null;
    try {
      const files = fflate.unzipSync(new Uint8Array(arrayBuffer));
      const td = new TextDecoder('utf-8');
      const parser = new DOMParser();
      const NSX = 'http://schemas.openxmlformats.org/spreadsheetml/2006/main';
      const NSMC = 'http://schemas.openxmlformats.org/markup-compatibility/2006';
      const NSR = 'http://schemas.openxmlformats.org/officeDocument/2006/relationships';

      const stylesBytes = files['xl/styles.xml'];
      if (!stylesBytes) return null;
      const sDoc = parser.parseFromString(td.decode(stylesBytes), 'application/xml');

      // fills
      const fills = [];
      const fillsNode = sDoc.getElementsByTagNameNS(NSX, 'fills')[0];
      if (fillsNode){
        for (const fe of fillsNode.children){
          if (fe.localName !== 'fill'){ fills.push(null); continue; }
          const pf = fe.getElementsByTagNameNS(NSX, 'patternFill')[0];
          if (!pf){ fills.push(null); continue; }
          const fg = pf.getElementsByTagNameNS(NSX, 'fgColor')[0];
          fills.push(fg ? fg.getAttribute('rgb') : null);
        }
      }

      // cellStyleXfs (상속용)
      const csxfList = [];
      const csxfsNode = sDoc.getElementsByTagNameNS(NSX, 'cellStyleXfs')[0];
      if (csxfsNode){
        for (const child of csxfsNode.children){
          if (child.localName === 'xf') csxfList.push(child);
          else if (child.localName === 'AlternateContent'){
            const c = child.getElementsByTagNameNS(NSMC, 'Choice')[0];
            const fb = child.getElementsByTagNameNS(NSMC, 'Fallback')[0];
            const target = c || fb;
            if (target){
              const xf = target.getElementsByTagNameNS(NSX, 'xf')[0];
              if (xf) csxfList.push(xf);
            }
          }
        }
      }

      // cellXfs (MCE-aware, Choice 우선)
      const xfList = [];
      const cellXfsNode = sDoc.getElementsByTagNameNS(NSX, 'cellXfs')[0];
      if (cellXfsNode){
        for (const child of cellXfsNode.children){
          if (child.localName === 'xf') xfList.push(child);
          else if (child.localName === 'AlternateContent'){
            const c = child.getElementsByTagNameNS(NSMC, 'Choice')[0];
            const fb = child.getElementsByTagNameNS(NSMC, 'Fallback')[0];
            const target = c || fb;
            if (target){
              const xf = target.getElementsByTagNameNS(NSX, 'xf')[0];
              if (xf) xfList.push(xf);
            }
          }
        }
      }

      function xfToColor(xf){
        const applyFillAttr = xf.getAttribute('applyFill');
        const applyFill = applyFillAttr === '1';
        const fillId = parseInt(xf.getAttribute('fillId') || '0', 10);
        // applyFill 명시되어 있고 true이거나, 속성 생략되었고 fillId>1이면 fill 사용
        const hasFill = applyFill || (applyFillAttr == null && fillId > 1);
        if (hasFill && fills[fillId]) return fills[fillId];
        // 상속: xfId가 가리키는 cellStyleXf의 fill
        const xfId = parseInt(xf.getAttribute('xfId') || '0', 10);
        if (xfId > 0 && xfId < csxfList.length){
          const parent = csxfList[xfId];
          const pFillId = parseInt(parent.getAttribute('fillId') || '0', 10);
          if (pFillId > 1 && fills[pFillId]) return fills[pFillId];
        }
        return null;
      }

      // workbook.xml + rels로 sheetName → xml 경로 매핑
      const sheetPathMap = {};
      const wbBytes = files['xl/workbook.xml'];
      const wbRelsBytes = files['xl/_rels/workbook.xml.rels'];
      if (wbBytes && wbRelsBytes){
        const wbDoc = parser.parseFromString(td.decode(wbBytes), 'application/xml');
        const relsDoc = parser.parseFromString(td.decode(wbRelsBytes), 'application/xml');
        const relMap = {};
        for (const rel of relsDoc.getElementsByTagName('Relationship')){
          relMap[rel.getAttribute('Id')] = rel.getAttribute('Target');
        }
        for (const sheet of wbDoc.getElementsByTagNameNS(NSX, 'sheet')){
          const name = sheet.getAttribute('name');
          const rid = sheet.getAttributeNS(NSR, 'id') || sheet.getAttribute('r:id');
          const target = relMap[rid];
          if (name && target){
            const full = target.startsWith('/') ? target.slice(1) : 'xl/' + target;
            sheetPathMap[name] = full;
          }
        }
      }

      // 시트별 cellRef → hex color 맵 구축
      const sheetColorMap = {};
      for (const name of Object.keys(sheetPathMap)){
        const bytes = files[sheetPathMap[name]];
        if (!bytes) continue;
        const shDoc = parser.parseFromString(td.decode(bytes), 'application/xml');
        const cells = shDoc.getElementsByTagNameNS(NSX, 'c');
        const m = {};
        for (const c of cells){
          const ref = c.getAttribute('r');
          const sAttr = c.getAttribute('s');
          if (!ref || !sAttr) continue;
          const idx = parseInt(sAttr, 10);
          if (!Number.isFinite(idx) || idx < 0 || idx >= xfList.length) continue;
          const color = xfToColor(xfList[idx]);
          if (!color) continue;
          const clean = color.length === 8 ? color.slice(2) : color;
          m[ref] = clean.toUpperCase();
        }
        sheetColorMap[name] = m;
      }
      return sheetColorMap;
    } catch(err){
      console.warn('MCE style map build failed:', err);
      return null;
    }
  }

  // ---------- Excel Import ----------
  // 시트가 월간(1~31일 헤더), 연간(1~52 주 순), 또는 unknown 인지 판별.
  function detectSheetKind(ws){
    if (!ws || !ws['!ref']) return 'unknown';
    const range = XLSX.utils.decode_range(ws['!ref']);
    // 연간 시그니처: R4(인덱스 3)에 1~52 연속 숫자 40개 이상
    let annualMatches = 0;
    const maxCol = Math.min(60, range.e.c);
    for (let c = 1; c <= maxCol; c++){
      const cell = ws[XLSX.utils.encode_cell({r: 3, c})];
      if (cell && typeof cell.v === 'number' && cell.v === c) annualMatches++;
    }
    if (annualMatches >= 40) return 'annual';
    // 월간 시그니처: 상단 몇 행 내에 1~31 연속 숫자 20개 이상
    const scanEnd = Math.min(range.s.r + 6, range.e.r);
    for (let r = range.s.r; r <= scanEnd; r++){
      let m = 0;
      for (let c = 1; c <= 31 && c <= range.e.c; c++){
        const cell = ws[XLSX.utils.encode_cell({r, c})];
        if (cell && typeof cell.v === 'number' && cell.v === c) m++;
      }
      if (m >= 20) return 'monthly';
    }
    return 'unknown';
  }

  function tryImportExcel(arrayBuffer, filename){
    const result = { monthly: { parsed: {}, count: 0, sheet: null }, annual: { parsed: null, count: 0, sheet: null } };
    try {
      const wb = XLSX.read(new Uint8Array(arrayBuffer), { type: 'array', cellStyles: true });
      // MCE-aware 색상 맵 — xlsx-js-style이 놓친 스타일 복구
      const mceColorMap = buildMceStyleMap(arrayBuffer);
      for (const sheetName of wb.SheetNames){
        const ws = wb.Sheets[sheetName];
        const kind = detectSheetKind(ws);
        if (kind === 'monthly'){
          const parsed = parseMonthlyCalendar(ws, sheetName, mceColorMap);
          const count = Object.values(parsed).reduce((s,arr) => s+arr.length, 0);
          if (count > result.monthly.count){ result.monthly = { parsed, count, sheet: sheetName }; }
        } else if (kind === 'annual'){
          const annual = parseAnnualCalendar(ws, sheetName, mceColorMap);
          const count = annual ? annual.projects.reduce((s,p) => s + (p.bars||[]).length, 0) : 0;
          if (annual && count >= result.annual.count){ result.annual = { parsed: annual, count, sheet: sheetName }; }
        }
      }
    } catch(err){
      console.warn('Import failed:', err);
    }
    return result;
  }

  function parseMonthlyCalendar(ws, sheetName, colorMap){
    if (!ws || !ws['!ref']) return {};
    const range = XLSX.utils.decode_range(ws['!ref']);
    const merges = (ws['!merges'] || []);

    let year = new Date().getFullYear();
    for (let r = range.s.r; r <= Math.min(range.s.r+5, range.e.r); r++){
      for (let c = range.s.c; c <= range.e.c; c++){
        const cell = ws[XLSX.utils.encode_cell({r,c})];
        if (cell && typeof cell.v === 'string'){
          const m = cell.v.match(/(\d{4})\s*년/);
          if (m){ year = parseInt(m[1],10); break; }
        }
      }
    }

    let dayRowIdx = -1;
    for (let r = range.s.r; r <= range.e.r; r++){
      let matches = 0;
      for (let c = 1; c <= 31 && c <= range.e.c; c++){
        const cell = ws[XLSX.utils.encode_cell({r,c})];
        if (cell && typeof cell.v === 'number' && cell.v === c) matches++;
      }
      if (matches >= 20){ dayRowIdx = r; break; }
    }
    if (dayRowIdx === -1) return {};

    const monthStarts = [];
    for (let r = dayRowIdx + 1; r <= range.e.r; r++){
      const cell = ws[XLSX.utils.encode_cell({r, c: 0})];
      if (cell && typeof cell.v === 'string'){
        const m = cell.v.match(/(\d{1,2})\s*월/);
        if (m){
          const mn = parseInt(m[1],10);
          if (mn >= 1 && mn <= 12) monthStarts.push({ row: r, month: mn - 1 });
        }
      }
    }
    if (monthStarts.length === 0) return {};

    monthStarts.forEach((ms, i) => {
      const merge = merges.find(mg => mg.s.r === ms.row && mg.s.c === 0);
      if (merge){ ms.endRow = merge.e.r; }
      else if (i + 1 < monthStarts.length){ ms.endRow = monthStarts[i+1].row - 1; }
      else { ms.endRow = range.e.r; }
    });

    const result = {};
    let curYear = year;
    let prevMonth = null;
    monthStarts.forEach(ms => {
      // 월 번호가 이전 월보다 작아지면 연도가 롤오버된 것으로 간주
      if (prevMonth !== null && ms.month < prevMonth) curYear += 1;
      const key = `${curYear}-${pad(ms.month+1)}`;
      if (!result[key]) result[key] = [];
      for (let r = ms.row + 1; r <= ms.endRow; r++){
        for (let c = 1; c <= 31 && c <= range.e.c; c++){
          const cell = ws[XLSX.utils.encode_cell({r,c})];
          if (!cell || cell.v === undefined || cell.v === null) continue;
          const val = typeof cell.v === 'string' ? cell.v.trim() : String(cell.v).trim();
          if (!val) continue;
          if (WEEKDAYS_KR.includes(val)) continue;
          const merge = merges.find(mg => mg.s.r === r && mg.s.c === c);
          const endCol = merge ? merge.e.c : c;
          if (!merge){
            const insideMerge = merges.find(mg => mg.s.r === r && mg.s.c < c && mg.e.c >= c);
            if (insideMerge) continue;
          }
          const startDay = c;
          const endDay = Math.min(endCol, 31);
          if (startDay < 1 || startDay > 31) continue;
          // 셀 코멘트를 notes로 추출
          const noteText = (cell.c && cell.c.length)
            ? cell.c.map(cm => (cm.t || '')).join('\n').trim()
            : '';
          const addr = XLSX.utils.encode_cell({r, c: startDay});
          // 셀 텍스트가 "✓ "로 시작하면 완료 상태로 import (title에서 prefix 제거)
          let parsedTitle = val;
          let parsedDone = false;
          if (parsedTitle.startsWith('✓ ')){
            parsedDone = true;
            parsedTitle = parsedTitle.slice(2);
          }
          result[key].push({ title: parsedTitle, start: startDay, end: endDay, notes: noteText, color: extractCellColor(cell, colorMap, sheetName, addr), done: parsedDone });
        }
      }
      prevMonth = ms.month;
    });

    return result;
  }

  // 셀 배경색 추출. MCE 스타일 맵(sheetName:{ref:hex})이 있으면 먼저 조회, 없으면 cell.s 폴백.
  function extractCellColor(cell, colorMap, sheetName, addr){
    if (colorMap && sheetName && addr){
      const m = colorMap[sheetName];
      if (m && m[addr]) return m[addr];
    }
    if (!cell || !cell.s) return null;
    const s = cell.s;
    const pt = s.patternType || (s.fill && s.fill.patternType);
    if (pt === 'none') return null;
    const fg = s.fgColor || (s.fill && s.fill.fgColor);
    if (fg && typeof fg.rgb === 'string'){
      const hex = fg.rgb.length === 8 ? fg.rgb.slice(2) : fg.rgb;
      return hex.toUpperCase();
    }
    const bg = s.bgColor || (s.fill && s.fill.bgColor);
    if (bg && typeof bg.rgb === 'string'){
      const hex = bg.rgb.length === 8 ? bg.rgb.slice(2) : bg.rgb;
      return hex.toUpperCase();
    }
    return null;
  }

  // 배경색 기준으로 읽기 쉬운 텍스트 색 결정 (YIQ 공식)
  function contrastTextColor(hex){
    if (!hex || typeof hex !== 'string' || hex.length < 6) return null;
    const h = hex.length === 8 ? hex.slice(2) : hex;
    const r = parseInt(h.slice(0,2), 16);
    const g = parseInt(h.slice(2,4), 16);
    const b = parseInt(h.slice(4,6), 16);
    const yiq = (r*299 + g*587 + b*114) / 1000;
    return yiq >= 150 ? '#1a1814' : '#ffffff';
  }

  function parseAnnualCalendar(ws, sheetName, colorMap){
    if (!ws || !ws['!ref']) return null;
    const range = XLSX.utils.decode_range(ws['!ref']);
    const merges = (ws['!merges'] || []);

    // (1) R1~R5 안에서 "YYYY년" 탐색 → year + title
    let year = new Date().getFullYear();
    let title = '';
    for (let r = range.s.r; r <= Math.min(range.s.r+4, range.e.r); r++){
      for (let c = range.s.c; c <= range.e.c; c++){
        const cell = ws[XLSX.utils.encode_cell({r,c})];
        if (cell && typeof cell.v === 'string'){
          const m = cell.v.match(/(\d{4})\s*년/);
          if (m){ year = parseInt(m[1],10); title = cell.v; break; }
        }
      }
      if (title) break;
    }
    if (!title) title = `${year}년 연구 개발 계획`;

    // (2) R4 (index 3) 에서 1..N 연속 주 순 읽어 totalWeeks 결정
    let totalWeeks = 0;
    for (let c = 1; c <= range.e.c; c++){
      const cell = ws[XLSX.utils.encode_cell({r: 3, c})];
      if (cell && typeof cell.v === 'number' && cell.v === c) totalWeeks = c;
      else break;
    }
    if (totalWeeks < 20) return null; // 형식 불일치

    // (3) R2 (index 1) 월 레이블 + 병합 범위 → monthWeeks
    const monthWeeks = [];
    for (let c = 1; c <= totalWeeks; c++){
      const cell = ws[XLSX.utils.encode_cell({r: 1, c})];
      if (!cell || cell.v === undefined || cell.v === null) continue;
      let monthNum = null;
      if (typeof cell.v === 'number') monthNum = cell.v;
      else {
        const s = String(cell.v).trim();
        const m = s.match(/(\d{1,2})/);
        if (m) monthNum = parseInt(m[1], 10);
      }
      if (!Number.isFinite(monthNum) || monthNum < 1 || monthNum > 12) continue;
      const merge = merges.find(mg => mg.s.r === 1 && mg.s.c === c);
      const endCol = merge ? merge.e.c : c;
      monthWeeks.push({ month: monthNum, startCol: c, endCol: Math.min(endCol, totalWeeks), weekCount: Math.min(endCol, totalWeeks) - c + 1 });
    }
    // 12개월이 다 안 찼으면 균등 분할 fallback
    if (monthWeeks.length < 12){
      const fb = defaultMonthWeeks();
      if (totalWeeks === 52){ /* 기본값 그대로 */ } else {
        // totalWeeks가 52가 아닌 경우 균등 분할 재계산
        const per = Math.floor(totalWeeks / 12);
        let col = 1;
        fb.length = 0;
        for (let i = 0; i < 12; i++){
          const wc = per + ((i < totalWeeks % 12) ? 1 : 0);
          fb.push({ month: i+1, startCol: col, endCol: col + wc - 1, weekCount: wc });
          col += wc;
        }
      }
      // 파싱된 부분은 우선 사용, 빈 월은 fallback으로 채움
      const filled = new Map(monthWeeks.map(mw => [mw.month, mw]));
      fb.forEach(mw => { if (!filled.has(mw.month)) monthWeeks.push(mw); });
      monthWeeks.sort((a,b) => a.month - b.month);
    }

    // (4) R5부터 프로젝트 행: A열 숫자가 행 번호. 각 행의 병합 범위별로 바 추출
    const projects = [];
    for (let r = 4; r <= range.e.r; r++){
      const labelCell = ws[XLSX.utils.encode_cell({r, c: 0})];
      if (!labelCell || labelCell.v === undefined || labelCell.v === null) continue;
      let rowIndex = null;
      if (typeof labelCell.v === 'number') rowIndex = labelCell.v;
      else {
        const s = String(labelCell.v).trim();
        const m = s.match(/^\d+/);
        if (m) rowIndex = parseInt(m[0], 10);
      }
      if (!Number.isFinite(rowIndex)) continue;

      const bars = [];
      for (let c = 1; c <= totalWeeks; c++){
        const cell = ws[XLSX.utils.encode_cell({r, c})];
        if (!cell || cell.v === undefined || cell.v === null) continue;
        const val = typeof cell.v === 'string' ? cell.v.trim() : String(cell.v).trim();
        if (!val) continue;
        const merge = merges.find(mg => mg.s.r === r && mg.s.c === c);
        const endCol = merge ? merge.e.c : c;
        if (!merge){
          const inside = merges.find(mg => mg.s.r === r && mg.s.c < c && mg.e.c >= c);
          if (inside) continue;
        }
        const noteText = (cell.c && cell.c.length)
          ? cell.c.map(cm => (cm.t || '')).join('\n').trim()
          : '';
        const addr = XLSX.utils.encode_cell({r, c});
        bars.push({
          id: barUid(),
          startWeek: c,
          endWeek: Math.min(endCol, totalWeeks),
          title: val,
          notes: noteText,
          color: extractCellColor(cell, colorMap, sheetName, addr)
        });
      }

      projects.push({ id: projUid(), rowIndex, bars });
    }

    return { year, title, totalWeeks, monthWeeks, projects };
  }

  // ---------- Excel Export ----------
  function buildMonthlySheet(){
    const MAX_DAYS = 31;
    const monthKeys = Object.keys(monthData).filter(k => (monthData[k].tasks || []).length > 0).sort();

    const rows = [];
    const merges = [];
    const cellNotesToAdd = [];
    const cellStylesToAdd = [];

    const title = '업무 일정 및 계획';
    const titleRow = [title];
    for (let i = 0; i < MAX_DAYS; i++) titleRow.push('');
    rows.push(titleRow);
    merges.push({s:{r:0,c:0},e:{r:0,c:MAX_DAYS}});

    const header = ['        일\n달'];
    for (let d = 1; d <= MAX_DAYS; d++) header.push(d);
    rows.push(header);

    monthKeys.forEach(key => {
      const parts = key.split('-');
      const y = parseInt(parts[0],10);
      const m = parseInt(parts[1],10) - 1;
      const days = daysInMonth(y,m);
      const { rowCount, ordered } = assignRows([...monthData[key].tasks]);

      const monthStartRowIdx = rows.length;

      const wdRow = [`${m+1}월`];
      for (let d = 1; d <= MAX_DAYS; d++){
        wdRow.push(d <= days ? WEEKDAYS_KR[weekdayOf(y,m,d)] : '');
      }
      rows.push(wdRow);

      const taskRows = [];
      for (let r = 0; r < rowCount; r++){
        const row = [''];
        for (let d = 0; d < MAX_DAYS; d++) row.push('');
        taskRows.push(row);
      }
      ordered.forEach(t => { taskRows[t._row][t.start] = (t.done ? '✓ ' : '') + (t.title || ''); });
      taskRows.forEach(r => rows.push(r));

      merges.push({s:{r:monthStartRowIdx,c:0},e:{r:monthStartRowIdx + rowCount, c:0}});
      ordered.forEach(t => {
        if (t.end > t.start){
          merges.push({
            s:{r: monthStartRowIdx + 1 + t._row, c: t.start},
            e:{r: monthStartRowIdx + 1 + t._row, c: t.end}
          });
        }
        if (t.notes && t.notes.trim()){
          cellNotesToAdd.push({
            r: monthStartRowIdx + 1 + t._row,
            c: t.start,
            text: t.notes
          });
        }
        if (t.color){
          cellStylesToAdd.push({
            r: monthStartRowIdx + 1 + t._row,
            c: t.start,
            color: t.color
          });
        }
      });
    });

    const ws = XLSX.utils.aoa_to_sheet(rows);
    ws['!merges'] = merges;

    // 컬럼 너비 — A열은 월 라벨/날짜 헤더 제목, 나머지는 일별
    const cols = [{wch:10}];
    for (let i = 0; i < MAX_DAYS; i++) cols.push({wch:7});
    ws['!cols'] = cols;

    // 행 높이 (pt) — 데이터 행은 3줄 고정(54pt). wrapText로 셀 폭 안에서 줄바꿈하되 행 높이는 고정.
    const lastRow = rows.length - 1;
    const lastCol = MAX_DAYS;
    const rowHeights = [
      { hpt: 38 }, // R1 제목
      { hpt: 22 }  // R2 일자 헤더
    ];
    for (let r = 2; r <= lastRow; r++) rowHeights.push({ hpt: 54 });
    ws['!rows'] = rowHeights;

    // 빈 셀은 stub cell ({t:'z'})로 만들어 엑셀이 "값 없는 빈 셀"로 인식하게 함.
    // 이렇게 하면 옆 task 셀의 글자가 길 때 자연스럽게 오버플로하여 표시됨.
    // (빈 문자열 ''로 채우면 "값 있음"으로 인식돼 오버플로가 차단되는 문제)
    for (let r = 0; r <= lastRow; r++){
      for (let c = 0; c <= lastCol; c++){
        const addr = XLSX.utils.encode_cell({r, c});
        if (!ws[addr]) ws[addr] = { t: 'z' };
      }
    }
    ws['!ref'] = XLSX.utils.encode_range({ s:{r:0,c:0}, e:{r:lastRow, c:lastCol} });

    const thinBorder = {
      top:    { style: 'thin', color: { rgb: '000000' } },
      bottom: { style: 'thin', color: { rgb: '000000' } },
      left:   { style: 'thin', color: { rgb: '000000' } },
      right:  { style: 'thin', color: { rgb: '000000' } }
    };
    const setStyle = (r, c, s) => {
      const addr = XLSX.utils.encode_cell({r, c});
      if (!ws[addr]) ws[addr] = { t: 'z' };
      ws[addr].s = Object.assign({}, ws[addr].s || {}, s);
    };
    const FONT = '맑은 고딕';

    // R1 제목 — 28pt 굵게 가운데
    for (let c = 0; c <= lastCol; c++){
      setStyle(0, c, {
        font: { name: FONT, sz: 28, bold: true, color: { rgb: '000000' } },
        alignment: { horizontal: 'center', vertical: 'center' },
        border: thinBorder,
        fill: { patternType: 'solid', fgColor: { rgb: 'FFFFFF' }, bgColor: { rgb: 'FFFFFF' } }
      });
    }

    // R2 일자 헤더 — 좌측 셀("    일\n달")은 줄바꿈
    for (let c = 0; c <= lastCol; c++){
      setStyle(1, c, {
        font: { name: FONT, sz: 12, bold: true, color: { rgb: '000000' } },
        alignment: { horizontal: 'center', vertical: 'center', wrapText: c === 0 },
        border: thinBorder
      });
    }

    // R3+ 모든 데이터 행 — 가운데, 굵게, 테두리.
    // wrapText:true → 셀 너비를 넘는 글자는 줄바꿈, 행 높이도 콘텐츠에 맞춰 자동 확장.
    for (let r = 2; r <= lastRow; r++){
      for (let c = 0; c <= lastCol; c++){
        setStyle(r, c, {
          font: { name: FONT, sz: 11, bold: true, color: { rgb: '000000' } },
          alignment: { horizontal: 'center', vertical: 'center', wrapText: true },
          border: thinBorder
        });
      }
    }

    cellNotesToAdd.forEach(({r, c, text}) => {
      const addr = XLSX.utils.encode_cell({r, c});
      if (ws[addr]){
        ws[addr].c = [{ a: 'KAR 일정', t: text }];
      }
    });

    // 바 배경색 — 위에서 적용한 일반 스타일 위에 fill만 덮어씀 (테두리/폰트 유지)
    cellStylesToAdd.forEach(({ r, c, color }) => {
      const addr = XLSX.utils.encode_cell({ r, c });
      if (ws[addr]){
        const prev = ws[addr].s || {};
        ws[addr].s = Object.assign({}, prev, {
          fill: { patternType: 'solid', fgColor: { rgb: color }, bgColor: { rgb: color } },
          patternType: 'solid',
          fgColor: { rgb: color },
          bgColor: { rgb: color }
        });
      }
    });

    return ws;
  }

  function buildAnnualSheet(annual){
    const totalCols = annual.totalWeeks || 52;
    const rows = [];
    const merges = [];
    const cellNotesToAdd = [];
    const cellStylesToAdd = []; // {r, c, color} — 저장 후 ws[addr].s에 적용

    // R1: 타이틀 (A1:??1 병합)
    const titleRow = [annual.title || `${annual.year}년 연구 개발 계획`];
    for (let i = 0; i < totalCols; i++) titleRow.push('');
    rows.push(titleRow);
    merges.push({ s:{r:0,c:0}, e:{r:0, c: totalCols} });

    // R2: 월 레이블
    const r2 = ['월'];
    for (let i = 0; i < totalCols; i++) r2.push('');
    annual.monthWeeks.forEach(mw => {
      r2[mw.startCol] = mw.month;
      if (mw.endCol > mw.startCol){
        merges.push({ s:{r:1,c:mw.startCol}, e:{r:1,c:mw.endCol} });
      }
    });
    rows.push(r2);

    // R3: 월 내 주 번호
    const r3 = ['주'];
    for (let i = 0; i < totalCols; i++) r3.push('');
    annual.monthWeeks.forEach(mw => {
      for (let w = 1; w <= mw.weekCount; w++){
        r3[mw.startCol + w - 1] = w;
      }
    });
    rows.push(r3);

    // R4: 연속 주 순 1..totalCols
    const r4 = ['    주\n순'];
    for (let w = 1; w <= totalCols; w++) r4.push(w);
    rows.push(r4);

    // R5~: 프로젝트 행
    annual.projects.forEach((p, idx) => {
      const rowIdx = 4 + idx;
      const rowArr = [p.rowIndex];
      for (let i = 0; i < totalCols; i++) rowArr.push('');
      (p.bars || []).forEach(bar => {
        const sw = Math.max(1, Math.min(totalCols, bar.startWeek));
        const ew = Math.max(sw, Math.min(totalCols, bar.endWeek));
        rowArr[sw] = bar.title || '';
        if (ew > sw){
          merges.push({ s:{r:rowIdx, c:sw}, e:{r:rowIdx, c:ew} });
        }
        if (bar.notes && bar.notes.trim()){
          cellNotesToAdd.push({ r: rowIdx, c: sw, text: bar.notes });
        }
        if (bar.color){
          cellStylesToAdd.push({ r: rowIdx, c: sw, color: bar.color });
        }
      });
      rows.push(rowArr);
    });

    const ws = XLSX.utils.aoa_to_sheet(rows);
    ws['!merges'] = merges;

    // 컬럼 너비 — A열은 라벨(주순/프로젝트번호), 나머지는 한 주씩
    const cols = [{ wch: 5 }];
    for (let i = 0; i < totalCols; i++) cols.push({ wch: 4.2 });
    ws['!cols'] = cols;

    // 행 높이 (pt)
    const lastRow = 4 + annual.projects.length - 1;
    const lastCol = totalCols;
    const rowHeights = [
      { hpt: 56 }, // R1 제목
      { hpt: 22 }, // R2 월
      { hpt: 16 }, // R3 주
      { hpt: 22 }  // R4 주순
    ];
    for (let i = 0; i < annual.projects.length; i++) rowHeights.push({ hpt: 28 });
    ws['!rows'] = rowHeights;

    // aoa_to_sheet은 빈 문자열을 셀로 만들지 않음. 테두리/스타일 적용을 위해
    // 모든 좌표에 빈 셀 객체를 보장.
    for (let r = 0; r <= lastRow; r++){
      for (let c = 0; c <= lastCol; c++){
        const addr = XLSX.utils.encode_cell({r, c});
        if (!ws[addr]) ws[addr] = { v: '', t: 's' };
      }
    }
    ws['!ref'] = XLSX.utils.encode_range({ s:{r:0,c:0}, e:{r:lastRow, c:lastCol} });

    // 공통 스타일 헬퍼
    const thinBorder = {
      top:    { style: 'thin', color: { rgb: '000000' } },
      bottom: { style: 'thin', color: { rgb: '000000' } },
      left:   { style: 'thin', color: { rgb: '000000' } },
      right:  { style: 'thin', color: { rgb: '000000' } }
    };
    const setStyle = (r, c, s) => {
      const addr = XLSX.utils.encode_cell({r, c});
      if (!ws[addr]) ws[addr] = { v: '', t: 's' };
      ws[addr].s = Object.assign({}, ws[addr].s || {}, s);
    };
    const FONT = '맑은 고딕';

    // R1: 제목 — 큰 폰트, 가운데, 굵게
    for (let c = 0; c <= lastCol; c++){
      setStyle(0, c, {
        font: { name: FONT, sz: 36, bold: true, color: { rgb: '000000' } },
        alignment: { horizontal: 'center', vertical: 'center' },
        border: thinBorder,
        fill: { patternType: 'solid', fgColor: { rgb: 'FFFFFF' }, bgColor: { rgb: 'FFFFFF' } }
      });
    }

    // R2 (월), R3 (주), R4 (주순) — 헤더
    for (let c = 0; c <= lastCol; c++){
      // R2 월 — 중간 크기, 굵게
      setStyle(1, c, {
        font: { name: FONT, sz: 13, bold: true, color: { rgb: '000000' } },
        alignment: { horizontal: 'center', vertical: 'center' },
        border: thinBorder
      });
      // R3 월 내 주 번호 — 작게, 굵게
      setStyle(2, c, {
        font: { name: FONT, sz: 9, bold: true, color: { rgb: '000000' } },
        alignment: { horizontal: 'center', vertical: 'center' },
        border: thinBorder
      });
      // R4 연속 주 순 — 작게, 줄바꿈(헤더 셀의 "주\n순")
      setStyle(3, c, {
        font: { name: FONT, sz: 9, bold: true, color: { rgb: '000000' } },
        alignment: { horizontal: 'center', vertical: 'center', wrapText: c === 0 },
        border: thinBorder
      });
    }

    // R5~: 프로젝트 행 — 가운데, 굵게(데이터 셀), 테두리
    for (let r = 4; r <= lastRow; r++){
      for (let c = 0; c <= lastCol; c++){
        setStyle(r, c, {
          font: { name: FONT, sz: 10, bold: c !== 0, color: { rgb: '000000' } },
          alignment: { horizontal: 'center', vertical: 'center' },
          border: thinBorder
        });
      }
    }

    // 셀 코멘트
    cellNotesToAdd.forEach(({ r, c, text }) => {
      const addr = XLSX.utils.encode_cell({ r, c });
      if (ws[addr]){
        ws[addr].c = [{ a: 'KAR 일정', t: text }];
      }
    });

    // 바 배경색 — 위에서 적용한 일반 스타일 위에 fill만 덮어씀 (테두리/폰트 유지)
    cellStylesToAdd.forEach(({ r, c, color }) => {
      const addr = XLSX.utils.encode_cell({ r, c });
      if (ws[addr]){
        const prev = ws[addr].s || {};
        ws[addr].s = Object.assign({}, prev, {
          fill: { patternType: 'solid', fgColor: { rgb: color }, bgColor: { rgb: color } },
          // 상위 레벨 속성도 함께 — 일부 엑셀 버전 호환
          patternType: 'solid',
          fgColor: { rgb: color },
          bgColor: { rgb: color }
        });
      }
    });

    return ws;
  }

  function buildExcelBuffer(){
    const wb = XLSX.utils.book_new();
    const monthKeys = Object.keys(monthData).filter(k => (monthData[k].tasks || []).length > 0);
    const hasMonthly = monthKeys.length > 0;

    // 연간 데이터가 있는 연도들 (바가 하나라도 있는 것만)
    const annualYears = Object.keys(annualData).filter(k => {
      const a = annualData[k];
      return a && (a.projects || []).some(p => (p.bars || []).length > 0);
    });
    // 현재 선택된 연도를 우선 사용. 없으면 첫 번째.
    let annualToWrite = null;
    if (annualData[String(currentAnnualYear)] && (annualData[String(currentAnnualYear)].projects || []).some(p => (p.bars || []).length > 0)){
      annualToWrite = annualData[String(currentAnnualYear)];
    } else if (annualYears.length > 0){
      annualToWrite = annualData[annualYears[0]];
    }

    if (annualToWrite){
      XLSX.utils.book_append_sheet(wb, buildAnnualSheet(annualToWrite), 'Sheet1');
    }
    if (hasMonthly){
      XLSX.utils.book_append_sheet(wb, buildMonthlySheet(), 'Sheet2');
    }
    // 양쪽 다 없으면 빈 Sheet2 (기존 동작 유지)
    if (!annualToWrite && !hasMonthly){
      XLSX.utils.book_append_sheet(wb, buildMonthlySheet(), 'Sheet2');
    }

    return XLSX.write(wb, { type: 'array', bookType: 'xlsx' });
  }


  // ---------- Task Detail Modal ----------
  let modalCtx = null; // { task, y, m }

  function openTaskModal(task, y, m, isNew){
    modalCtx = { task, y, m, isNew: !!isNew };
    const titleInput = document.getElementById('modal-title-input');
    const startInput = document.getElementById('modal-start-input');
    const endInput = document.getElementById('modal-end-input');
    const notesInput = document.getElementById('modal-notes-input');
    const titleText = document.getElementById('modal-title-text');
    const deleteBtn = document.getElementById('modal-delete-btn');
    titleInput.value = task.title || '';
    // 여러 달 기간(fullStart/fullEnd)이 있으면 우선, 없으면 현재 조각 y/m/start~end
    const fullStartIso = task.fullStart || fmtISO(new Date(y, m, task.start));
    const fullEndIso = task.fullEnd || fmtISO(new Date(y, m, task.end));
    startInput.value = fullStartIso;
    endInput.value = fullEndIso;
    notesInput.value = task.notes || '';
    renderColorSwatches('task-modal-swatches', 'task-modal-color-custom', task.color);
    document.getElementById('task-modal-swatches').dataset.selectedColor = task.color || '';
    // 완료 체크박스 동기화
    setModalDone(!!task.done);
    if (titleText) titleText.textContent = isNew ? '새 업무 추가' : '업무 상세';
    if (deleteBtn) deleteBtn.hidden = !!isNew;
    updateModalDatesDisplay();
    document.getElementById('task-modal').classList.add('is-open');
    setTimeout(() => titleInput.focus(), 50);
  }
  function setModalDone(checked){
    const row = document.getElementById('modal-done-row');
    const tog = document.getElementById('modal-done-toggle');
    if (!row || !tog) return;
    row.classList.toggle('is-checked', !!checked);
    tog.classList.toggle('is-checked', !!checked);
    tog.setAttribute('aria-checked', String(!!checked));
    tog.dataset.checked = checked ? '1' : '0';
  }
  function getModalDone(){
    const tog = document.getElementById('modal-done-toggle');
    return tog && tog.dataset.checked === '1';
  }

  function closeTaskModal(){
    document.getElementById('task-modal').classList.remove('is-open');
    modalCtx = null;
  }

  function parseIsoDate(iso){
    if (!iso) return null;
    const [ys, ms, ds] = iso.split('-').map(n => parseInt(n, 10));
    if (!ys || !ms || !ds) return null;
    return new Date(ys, ms - 1, ds);
  }
  function updateModalDatesDisplay(){
    if (!modalCtx) return;
    const sIso = document.getElementById('modal-start-input').value;
    const eIso = document.getElementById('modal-end-input').value;
    const sd = parseIsoDate(sIso);
    const ed = parseIsoDate(eIso);
    if (!sd || !ed) { document.getElementById('modal-dates-display').textContent = ''; return; }
    const days = Math.max(1, Math.round((ed - sd) / 86400000) + 1);
    const sameDay = sIso === eIso;
    const display = sameDay
      ? `${sd.getMonth()+1}/${sd.getDate()} (${WEEKDAYS_KR[sd.getDay()]})`
      : `${sd.getMonth()+1}/${sd.getDate()}(${WEEKDAYS_KR[sd.getDay()]}) — ${ed.getMonth()+1}/${ed.getDate()}(${WEEKDAYS_KR[ed.getDay()]}) · 총 ${days}일`;
    document.getElementById('modal-dates-display').textContent = display;
  }

  // Modal input wiring — 편집은 DOM에만 유지. 저장 버튼 클릭 시에만 객체 반영.
  function syncModalChanges(){
    saveAllLocal();
    renderCalendar();
    renderThisWeek();
    if (allSectionOpen) renderAllTasks();
  }
  // 날짜 변경 시 DOM 정합성만 유지 (객체 수정 없음).
  // ISO 문자열(YYYY-MM-DD) 기준 — 종료 < 시작이면 종료를 시작과 같게 맞춤.
  const modalOnDateChange = () => {
    if (!modalCtx) return;
    const startEl = document.getElementById('modal-start-input');
    const endEl = document.getElementById('modal-end-input');
    const sd = parseIsoDate(startEl.value);
    const ed = parseIsoDate(endEl.value);
    if (sd && ed && ed < sd) endEl.value = startEl.value;
    updateModalDatesDisplay();
  };
  document.getElementById('modal-start-input').addEventListener('change', modalOnDateChange);
  document.getElementById('modal-end-input').addEventListener('change', modalOnDateChange);

  // 색상 선택 — DOM 상태만 갱신 (data-selected-color + active 표시)
  document.getElementById('task-modal-swatches').addEventListener('click', (e) => {
    const btn = e.target.closest('.color-swatch');
    if (!btn) return;
    selectTaskColor(btn.dataset.color || '');
  });
  document.getElementById('task-modal-color-custom').addEventListener('input', (e) => {
    selectTaskColor(e.target.value);
  });

  // 인라인 제목 편집 시 같은 그룹(여러 달 업무)의 모든 조각 title 동기화
  function syncTaskTitleInGroup(task, newTitle){
    task.title = newTitle;
    if (!task.groupId) return;
    Object.keys(monthData).forEach(k => {
      if (!monthData[k] || !Array.isArray(monthData[k].tasks)) return;
      monthData[k].tasks.forEach(t => {
        if (t.groupId === task.groupId && t !== task) t.title = newTitle;
      });
    });
  }
  // 완료 토글 — 같은 그룹의 모든 조각에 동기화, 저장, 재렌더
  function toggleTaskDone(task){
    const next = !task.done;
    task.done = next;
    if (task.groupId){
      Object.keys(monthData).forEach(k => {
        if (!monthData[k] || !Array.isArray(monthData[k].tasks)) return;
        monthData[k].tasks.forEach(t => {
          if (t.groupId === task.groupId) t.done = next;
        });
      });
    }
    saveAllLocal();
    renderCalendar();
    renderThisWeek();
    if (allSectionOpen) renderAllTasks();
  }

  // 같은 groupId(여러 달 걸친 업무)의 모든 조각을 모든 달에서 제거.
  // groupId 없으면 task.id로 해당 달에서만 제거.
  function removeTaskOrGroup(task){
    if (task.groupId){
      Object.keys(monthData).forEach(k => {
        if (monthData[k] && Array.isArray(monthData[k].tasks)){
          monthData[k].tasks = monthData[k].tasks.filter(t => t.groupId !== task.groupId);
        }
      });
    } else {
      Object.keys(monthData).forEach(k => {
        if (monthData[k] && Array.isArray(monthData[k].tasks)){
          monthData[k].tasks = monthData[k].tasks.filter(t => t.id !== task.id);
        }
      });
    }
  }

  // sIso ~ eIso 범위를 월 경계로 쪼개 monthData[각 달].tasks에 조각으로 분산 저장.
  // 모든 조각은 동일 groupId + fullStart/fullEnd 공유해서 추후 한 번에 수정/삭제 가능.
  function distributeTaskAcrossMonths({ groupId, sIso, eIso, title, notes, color, done }){
    const sd = parseIsoDate(sIso);
    const ed = parseIsoDate(eIso);
    if (!sd || !ed) return [];
    const created = [];
    const cursor = new Date(sd.getFullYear(), sd.getMonth(), 1);
    while (cursor <= ed){
      const y2 = cursor.getFullYear();
      const m2 = cursor.getMonth();
      const lastDay = daysInMonth(y2, m2);
      const isStartMonth = (y2 === sd.getFullYear() && m2 === sd.getMonth());
      const isEndMonth = (y2 === ed.getFullYear() && m2 === ed.getMonth());
      const dayStart = isStartMonth ? sd.getDate() : 1;
      const dayEnd = isEndMonth ? ed.getDate() : lastDay;
      const key = monthKey(y2, m2);
      if (!monthData[key]) monthData[key] = { tasks: [] };
      const piece = {
        id: uid(),
        groupId,
        title: title || '',
        start: dayStart,
        end: dayEnd,
        notes: notes || '',
        color: color || null,
        done: !!done,
        fullStart: sIso,
        fullEnd: eIso
      };
      monthData[key].tasks.push(piece);
      created.push(piece);
      cursor.setMonth(m2 + 1);
    }
    return created;
  }

  // 완료 체크박스 — 행 전체 클릭으로 토글
  document.getElementById('modal-done-row').addEventListener('click', (e) => {
    e.preventDefault();
    setModalDone(!getModalDone());
  });
  document.getElementById('modal-done-toggle').addEventListener('keydown', (e) => {
    if (e.key === ' ' || e.key === 'Enter'){ e.preventDefault(); setModalDone(!getModalDone()); }
  });

  document.getElementById('modal-close-btn').addEventListener('click', closeTaskModal);
  document.getElementById('modal-save-btn').addEventListener('click', () => {
    if (!modalCtx) { closeTaskModal(); return; }
    const { task, y, m, isNew } = modalCtx;
    const sIsoRaw = document.getElementById('modal-start-input').value;
    const eIsoRaw = document.getElementById('modal-end-input').value;
    const sd = parseIsoDate(sIsoRaw);
    const ed = parseIsoDate(eIsoRaw);
    if (!sd || !ed){
      showToast('시작/종료 날짜를 올바르게 입력하세요', 'error', 2000);
      return;
    }
    // 종료 < 시작이면 swap
    const sIso = (ed < sd) ? eIsoRaw : sIsoRaw;
    const eIso = (ed < sd) ? sIsoRaw : eIsoRaw;
    const title = document.getElementById('modal-title-input').value;
    const notes = document.getElementById('modal-notes-input').value;
    const color = document.getElementById('task-modal-swatches').dataset.selectedColor || null;
    const done = getModalDone();

    // 기존 그룹/태스크 제거 후 월별 조각 재분산
    const groupId = (!isNew && task.groupId) ? task.groupId : ('g_' + Math.random().toString(36).slice(2, 9));
    if (!isNew) removeTaskOrGroup(task);
    const pieces = distributeTaskAcrossMonths({ groupId, sIso, eIso, title, notes, color, done });
    focusedTaskId = pieces.length > 0 ? pieces[0].id : null;

    if (isNew && pieces.length > 0){
      const first = pieces[0];
      const firstY = parseIsoDate(first.fullStart).getFullYear();
      const firstM = parseIsoDate(first.fullStart).getMonth();
      const {start: twStart, end: twEnd} = getTwRange();
      const inTw = pieces.some(p => {
        // 어떤 조각이라도 이번주 범위에 걸치면 tw 쪽
        const py = parseIsoDate(p.fullStart).getFullYear();
        // 각 조각의 월별 y/m은 monthData 키에서 유추 어려우니, fullStart/fullEnd 범위로 간단히 체크
        return parseIsoDate(p.fullStart) <= twEnd && parseIsoDate(p.fullEnd) >= twStart;
      });
      if (inTw){
        if (twCollapsed) setTwCollapsed(false);
      } else {
        if (!allSectionOpen) toggleAllSection(true);
      }
    }

    syncModalChanges();
    closeTaskModal();
    showToast(isNew ? '추가됨' : '저장됨', 'success', 1500);
  });
  document.getElementById('modal-delete-btn').addEventListener('click', () => {

    const titleSnippet = task.title ? `"${task.title}"` : '(제목 없는) 업무';
    if (!confirm(`${titleSnippet}를 삭제하시겠습니까?`)) return;
    removeTaskOrGroup(task); // 여러 달 조각 전체 제거
    editingTwIds.delete(task.id);

    renderThisWeek();

  // (바깥 클릭으로 닫기는 실수 방지 위해 제거 — X 또는 저장 버튼으로만 닫힘)

  // ---------- Annual Bar Modal ----------
  let annualModalCtx = null; // { project, bar, annual }

  // 원본 엑셀에서 자주 쓰는 프리셋 팔레트 (hex, 대문자)
  const ANNUAL_COLOR_PRESETS = [
    { hex: 'FAA4B0', label: '연분홍' },
    { hex: 'FFC000', label: '주황' },
    { hex: 'F9DB6F', label: '노랑' },
    { hex: 'FFFF69', label: '밝은 노랑' },
    { hex: 'C5E0B4', label: '연두' },
    { hex: 'A9D18E', label: '초록' },
    { hex: '9DC3E6', label: '연파랑' },
    { hex: 'B4C7E7', label: '파랑' },
    { hex: 'C59EE2', label: '연보라' }
  ];

  // 범용 스와치 렌더러 — swatchesElId/customInputId를 받아 월간/연간 모두 지원
  function renderColorSwatches(swatchesElId, customInputId, currentColor){
    const wrap = document.getElementById(swatchesElId);
    if (!wrap) return;
    wrap.innerHTML = '';
    const noneBtn = document.createElement('button');
    noneBtn.type = 'button';
    noneBtn.className = 'color-swatch is-none' + (!currentColor ? ' is-active' : '');
    noneBtn.title = '색 없음';
    noneBtn.dataset.color = '';
    noneBtn.setAttribute('role', 'radio');
    noneBtn.setAttribute('aria-checked', String(!currentColor));
    wrap.appendChild(noneBtn);
    ANNUAL_COLOR_PRESETS.forEach(p => {
      const btn = document.createElement('button');
      btn.type = 'button';
      btn.className = 'color-swatch' + (currentColor === p.hex ? ' is-active' : '');
      btn.style.background = '#' + p.hex;
      btn.title = `${p.label} (#${p.hex})`;
      btn.dataset.color = p.hex;
      btn.setAttribute('role', 'radio');
      btn.setAttribute('aria-checked', String(currentColor === p.hex));
      wrap.appendChild(btn);
    });
    const customInput = document.getElementById(customInputId);
    if (customInput){
      const isPreset = !currentColor || ANNUAL_COLOR_PRESETS.some(p => p.hex === currentColor);
      customInput.value = '#' + (currentColor && !isPreset ? currentColor : 'FFFFFF');
    }
  }

  // DOM 전용 — 스와치 상태만 갱신. 저장 버튼 눌러야 bar에 반영.
  function selectBarColor(colorHex){
    if (!annualModalCtx) return;
    const normalized = colorHex ? String(colorHex).replace('#','').toUpperCase() : '';
    const wrap = document.getElementById('annual-modal-swatches');
    wrap.dataset.selectedColor = normalized;
    renderColorSwatches('annual-modal-swatches', 'annual-modal-color-custom', normalized);
  }

  // DOM 전용 — 스와치 active 상태만 바꾸고 task 객체는 건드리지 않음
  function selectTaskColor(colorHex){
    if (!modalCtx) return;
    const normalized = colorHex ? String(colorHex).replace('#','').toUpperCase() : '';
    const wrap = document.getElementById('task-modal-swatches');
    wrap.dataset.selectedColor = normalized;
    renderColorSwatches('task-modal-swatches', 'task-modal-color-custom', normalized);
  }

  function weekToMonthWeek(annual, week){
    for (const mw of annual.monthWeeks){
      if (week >= mw.startCol && week <= mw.endCol){
        return { month: mw.month, weekInMonth: week - mw.startCol + 1 };
      }
    }
    return null;
  }
  function monthWeekToWeek(annual, month, weekInMonth){
    const mw = annual.monthWeeks.find(x => x.month === month);
    if (!mw) return null;
    const clamped = Math.max(1, Math.min(mw.weekCount, weekInMonth));
    return mw.startCol + clamped - 1;
  }

  function populateMonthSelect(selEl, annual){
    selEl.innerHTML = '';
    annual.monthWeeks.forEach(mw => {
      const opt = document.createElement('option');
      opt.value = String(mw.month);
      opt.textContent = `${mw.month}월`;
      selEl.appendChild(opt);
    });
  }
  function populateWeekSelect(selEl, annual, month){
    selEl.innerHTML = '';
    const mw = annual.monthWeeks.find(x => x.month === month);
    if (!mw) return;
    for (let w = 1; w <= mw.weekCount; w++){
      const opt = document.createElement('option');
      opt.value = String(w);
      opt.textContent = `${w}주`;
      selEl.appendChild(opt);
    }
  }

  function openAnnualBarModal(projectId, barId){
    const annual = getOrCreateAnnual(currentAnnualYear);
    const project = annual.projects.find(p => p.id === projectId);
    if (!project) return;
    const bar = project.bars.find(b => b.id === barId);
    if (!bar) return;
    annualModalCtx = { project, bar, annual };
    focusedBarId = bar.id;

    const titleInput = document.getElementById('annual-modal-title-input');
    const smEl = document.getElementById('annual-modal-start-month');
    const swEl = document.getElementById('annual-modal-start-week');
    const emEl = document.getElementById('annual-modal-end-month');
    const ewEl = document.getElementById('annual-modal-end-week');
    const notesInput = document.getElementById('annual-modal-notes-input');

    titleInput.value = bar.title || '';
    populateMonthSelect(smEl, annual);
    populateMonthSelect(emEl, annual);

    const sMW = weekToMonthWeek(annual, bar.startWeek) || { month: annual.monthWeeks[0].month, weekInMonth: 1 };
    const eMW = weekToMonthWeek(annual, bar.endWeek) || sMW;
    smEl.value = String(sMW.month);
    emEl.value = String(eMW.month);
    populateWeekSelect(swEl, annual, sMW.month);
    populateWeekSelect(ewEl, annual, eMW.month);
    swEl.value = String(sMW.weekInMonth);
    ewEl.value = String(eMW.weekInMonth);

    notesInput.value = bar.notes || '';
    renderColorSwatches('annual-modal-swatches', 'annual-modal-color-custom', bar.color);
    document.getElementById('annual-modal-swatches').dataset.selectedColor = bar.color || '';
    updateAnnualModalDatesDisplay();
    document.getElementById('annual-bar-modal').classList.add('is-open');
    setTimeout(() => titleInput.focus(), 50);
  }
  function closeAnnualBarModal(){
    document.getElementById('annual-bar-modal').classList.remove('is-open');
    annualModalCtx = null;
  }
  function updateAnnualModalDatesDisplay(){
    if (!annualModalCtx) return;
    const { annual } = annualModalCtx;
    const sm = parseInt(document.getElementById('annual-modal-start-month').value, 10);
    const sw = parseInt(document.getElementById('annual-modal-start-week').value, 10);
    const em = parseInt(document.getElementById('annual-modal-end-month').value, 10);
    const ew = parseInt(document.getElementById('annual-modal-end-week').value, 10);
    const sWeek = monthWeekToWeek(annual, sm, sw);
    const eWeek = monthWeekToWeek(annual, em, ew);
    if (sWeek == null || eWeek == null) return;
    const span = Math.max(0, eWeek - sWeek + 1);
    document.getElementById('annual-modal-dates-display').textContent = `${sm}월 ${sw}주 — ${em}월 ${ew}주 · 총 ${span}주`;
  }

  function syncAnnualModalChanges(){
    saveAnnualLocal();
    if (currentView === 'annual') renderAnnual();
  }

  // Annual modal — 편집은 DOM에만 유지. 저장 버튼에서 bar 객체에 일괄 반영.
  const annualModalOnDateChange = () => {
    if (!annualModalCtx) return;
    const { annual } = annualModalCtx;
    const smEl = document.getElementById('annual-modal-start-month');
    const swEl = document.getElementById('annual-modal-start-week');
    const emEl = document.getElementById('annual-modal-end-month');
    const ewEl = document.getElementById('annual-modal-end-week');
    // 월 변경 시 해당 월 주 목록 재구성
    populateWeekSelect(swEl, annual, parseInt(smEl.value, 10));
    populateWeekSelect(ewEl, annual, parseInt(emEl.value, 10));
    if (!swEl.value) swEl.value = '1';
    if (!ewEl.value) ewEl.value = '1';
    // 종료 < 시작 정합성만 DOM에서 맞춤
    const sWeek = monthWeekToWeek(annual, parseInt(smEl.value,10), parseInt(swEl.value,10));
    const eWeek = monthWeekToWeek(annual, parseInt(emEl.value,10), parseInt(ewEl.value,10));
    if (sWeek != null && eWeek != null && eWeek < sWeek){
      const mwEnd = weekToMonthWeek(annual, sWeek);
      if (mwEnd){
        emEl.value = String(mwEnd.month);
        populateWeekSelect(ewEl, annual, mwEnd.month);
        ewEl.value = String(mwEnd.weekInMonth);
      }
    }
    updateAnnualModalDatesDisplay();
  };
  ['annual-modal-start-month','annual-modal-start-week','annual-modal-end-month','annual-modal-end-week']
    .forEach(id => document.getElementById(id).addEventListener('change', annualModalOnDateChange));

  // 색상 선택 (DOM 전용)

  document.getElementById('annual-modal-close-btn').addEventListener('click', closeAnnualBarModal);
  document.getElementById('annual-modal-save-btn').addEventListener('click', () => {

    const { bar, annual } = annualModalCtx;

    let sWeek = monthWeekToWeek(annual, sm, sw);
    let eWeek = monthWeekToWeek(annual, em, ew);
    if (sWeek == null) sWeek = bar.startWeek;
    if (eWeek == null) eWeek = bar.endWeek;

    bar.color = color || null;

  document.getElementById('annual-modal-delete-btn').addEventListener('click', () => {

  // ---------- Annual View (Sheet1) ----------
  function setView(kind){
    currentView = (kind === 'annual') ? 'annual' : 'monthly';
    document.getElementById('monthly-panel').hidden = (currentView !== 'monthly');
    document.getElementById('annual-panel').hidden = (currentView !== 'annual');
    document.querySelectorAll('.view-tab').forEach(b => {
      const active = b.dataset.view === currentView;
      b.classList.toggle('is-active', active);
      b.setAttribute('aria-selected', String(active));
    });
    try{ localStorage.setItem(VIEW_KEY, currentView); }catch(e){}
    if (currentView === 'annual') renderAnnual();
