  function changeAnnualYear(delta){
    currentAnnualYear = currentAnnualYear + delta;
    focusedBarId = null;
    try{ localStorage.setItem(ANNUAL_YEAR_KEY, String(currentAnnualYear)); }catch(e){}
    renderAnnual();
  }


  function addAnnualProjectRow(){
    const annual = getOrCreateAnnual(currentAnnualYear);
    const nextIndex = annual.projects.length > 0
      ? Math.max(...annual.projects.map(p => p.rowIndex || 0)) + 1
      : 1;
    // 기본 바 1개 생성 (현재 주를 기준으로 4주)
    const startWeek = 1;
    const endWeek = Math.min(annual.totalWeeks || 52, 4);
    const newBar = { id: barUid(), startWeek, endWeek, title: '', notes: '' };
    const newProject = { id: projUid(), rowIndex: nextIndex, bars: [newBar] };
    annual.projects.push(newProject);
    saveAnnualLocal();
    renderAnnual();
    openAnnualBarModal(newProject.id, newBar.id);
  }

  function deleteAnnualProjectRow(projectId){
    const annual = getOrCreateAnnual(currentAnnualYear);
    const idx = annual.projects.findIndex(p => p.id === projectId);
    if (idx < 0) return;
    const p = annual.projects[idx];
    const barCount = (p.bars || []).length;
    const msg = barCount > 0
      ? `프로젝트 행 ${p.rowIndex}을(를) 삭제하시겠습니까? (바 ${barCount}개 포함)`
      : `프로젝트 행 ${p.rowIndex}을(를) 삭제하시겠습니까?`;
    if (!confirm(msg)) return;
    annual.projects.splice(idx, 1);
    // 뒤 행 rowIndex 재번호
    annual.projects.forEach((pp, i) => { pp.rowIndex = i + 1; });
    saveAnnualLocal();
    renderAnnual();
  }

  function addBarToProject(projectId, startWeek){
    const annual = getOrCreateAnnual(currentAnnualYear);
    const project = annual.projects.find(p => p.id === projectId);
    if (!project) return;
    const sw = Math.max(1, Math.min(annual.totalWeeks, startWeek));
    const ew = Math.min(annual.totalWeeks, sw + 3);
    const newBar = { id: barUid(), startWeek: sw, endWeek: ew, title: '', notes: '' };
    project.bars.push(newBar);
    saveAnnualLocal();
    renderAnnual();
    openAnnualBarModal(project.id, newBar.id);
  }

  function renderAnnual(){
    const annual = getOrCreateAnnual(currentAnnualYear);
    document.getElementById('annual-title').textContent = annual.title || `${currentAnnualYear}년 연구 개발 계획`;
    renderAnnualGrid(annual);
  }

  function renderAnnualGrid(annual){
    const body = document.getElementById('annual-body');
    body.innerHTML = '';

    if (!annual.projects || annual.projects.length === 0){
      const wrap = document.createElement('div');
      wrap.className = 'annual-wrap';
      const empty = document.createElement('div');
      empty.className = 'annual-empty';
      empty.innerHTML = `<strong>${escapeHtml(String(currentAnnualYear))}년 연간 계획서가 비어있습니다</strong><br>아래 <kbd>+ 프로젝트 행 추가</kbd> 버튼으로 시작하세요.<br><span style="font-size:12px">※ 또는 Sheet1이 있는 엑셀 파일을 연결하면 자동으로 불러옵니다.</span>`;
      wrap.appendChild(empty);
      body.appendChild(wrap);
      return;
    }

    const wrap = document.createElement('div');
    wrap.className = 'annual-wrap';
    const grid = document.createElement('div');
    grid.className = 'annual-grid';
    grid.id = 'annual-grid';

    const totalWeeks = annual.totalWeeks || 52;
    grid.style.gridTemplateColumns = `120px repeat(${totalWeeks}, minmax(24px, 1fr))`;
    const rowCount = annual.projects.length;
    grid.style.gridTemplateRows = `auto auto auto repeat(${rowCount}, 44px)`;

    // Row 1 corner (spans rows 1-3)
    const corner = document.createElement('div');
    corner.className = 'annual-corner';
    corner.textContent = '행';
    grid.appendChild(corner);

    // Row 1: 월 레이블 (병합된 그리드 셀로 표현)
    annual.monthWeeks.forEach((mw, idx) => {
      const cell = document.createElement('div');
      cell.className = 'annual-month-cell';
      if (idx % 2 === 1) cell.style.background = '#efe6d0';
      cell.textContent = `${mw.month}월`;
      cell.style.gridRow = '1';
      cell.style.gridColumn = `${mw.startCol + 1} / ${mw.endCol + 2}`;
      grid.appendChild(cell);
    });

    // Row 2: 월 내 주 번호
    annual.monthWeeks.forEach(mw => {
      for (let w = 1; w <= mw.weekCount; w++){
        const cell = document.createElement('div');
        cell.className = 'annual-weekinmonth';
        cell.textContent = w;
        cell.style.gridRow = '2';
        cell.style.gridColumn = String(mw.startCol + w);
        grid.appendChild(cell);
      }
    });

    // Row 3: 연속 주 번호
    for (let w = 1; w <= totalWeeks; w++){
      const cell = document.createElement('div');
      cell.className = 'annual-weeknum';
      cell.textContent = w;
      cell.style.gridRow = '3';
      cell.style.gridColumn = String(w + 1);
      grid.appendChild(cell);
    }

    // Row 4+: 프로젝트 행
    annual.projects.forEach((p, pi) => {
      const rowNum = 4 + pi;

      // 왼쪽 행 라벨 + 삭제 버튼
      const label = document.createElement('div');
      label.className = 'annual-rowlabel';
      label.innerHTML = `<span>${escapeHtml(String(p.rowIndex))}</span><button class="row-remove" data-pid="${escapeAttr(p.id)}" title="이 행 삭제">×</button>`;
      label.style.gridRow = String(rowNum);
      label.style.gridColumn = '1';
      label.querySelector('.row-remove').addEventListener('click', (ev) => {
        ev.stopPropagation();
        deleteAnnualProjectRow(p.id);
      });
      grid.appendChild(label);

      // 배경 셀 — 더블클릭으로 새 바 추가
      for (let w = 1; w <= totalWeeks; w++){
        const bg = document.createElement('div');
        bg.className = 'annual-bg';
        const mw = annual.monthWeeks.find(x => w >= x.startCol && w <= x.endCol);
        if (mw && mw.month % 2 === 0) bg.classList.add('is-month-even');
        bg.style.gridRow = String(rowNum);
        bg.style.gridColumn = String(w + 1);
        bg.dataset.pid = p.id;
        bg.dataset.week = String(w);
        bg.title = '더블클릭으로 이 주에 새 업무 추가';
        bg.addEventListener('dblclick', () => addBarToProject(p.id, w));
        grid.appendChild(bg);
      }

      // 바
      (p.bars || []).forEach(bar => {
        const sw = Math.max(1, Math.min(totalWeeks, bar.startWeek));
        const ew = Math.max(sw, Math.min(totalWeeks, bar.endWeek));
        const el = document.createElement('div');
        el.className = 'annual-bar';
        if (bar.id === focusedBarId) el.classList.add('is-focused');
        // 원본 엑셀의 색상 복원
        if (bar.color){
          el.style.background = '#' + bar.color;
          const textColor = contrastTextColor(bar.color);
          if (textColor) el.style.color = textColor;
          el.classList.add('has-custom-color');
        }
        const titleStr = bar.title || '(제목 없음)';
        el.textContent = titleStr;
        const mwStart = annual.monthWeeks.find(x => sw >= x.startCol && sw <= x.endCol);
        const mwEnd = annual.monthWeeks.find(x => ew >= x.startCol && ew <= x.endCol);
        const startLabel = mwStart ? `${mwStart.month}월 ${sw - mwStart.startCol + 1}주` : `${sw}주`;
        const endLabel = mwEnd ? `${mwEnd.month}월 ${ew - mwEnd.startCol + 1}주` : `${ew}주`;
        el.title = `${titleStr}\n${startLabel} ~ ${endLabel}${bar.notes ? '\n\n' + bar.notes : ''}\n(클릭해서 상세 보기)`;
        el.style.gridRow = String(rowNum);
        el.style.gridColumn = `${sw + 1} / ${ew + 2}`;
        el.dataset.pid = p.id;
        el.dataset.bid = bar.id;
        el.addEventListener('click', () => openAnnualBarModal(p.id, bar.id));
        grid.appendChild(el);
      });
    });

    wrap.appendChild(grid);
    body.appendChild(wrap);
  }

  // ---------- Wiring ----------
  function changeMonth(delta){
    const d = new Date(currentYear, currentMonth + delta, 1);
    currentYear = d.getFullYear();
    currentMonth = d.getMonth();
    focusedTaskId = null;
    // 다른 달로 이동하면 주간 섹션(지난주/이번주/다음주)은 현재 달 컨텍스트와
    // 맞지 않으므로 자동으로 접는다
    if (!twCollapsed) setTwCollapsed(true);
    renderMonthHeader(); renderCalendar({ scrollToThisWeek: true });
    if (allSectionOpen) renderAllTasks();
  }
  document.getElementById('prev-month').addEventListener('click', () => changeMonth(-1));
  document.getElementById('next-month').addEventListener('click', () => changeMonth(1));
  document.getElementById('add-log-btn').addEventListener('click', addTaskLog);
  document.getElementById('all-collapse-btn').addEventListener('click', () => toggleAllSection());

  function syncCalendarExpandBtn(){
    const btn = document.getElementById('cal-expand-btn');
    if (!btn) return;
    btn.setAttribute('aria-pressed', String(calendarExpanded));
    btn.textContent = calendarExpanded ? '📐 달력 접기' : '📐 달력 펼치기';
  }
  document.getElementById('cal-expand-btn').addEventListener('click', () => {
    calendarExpanded = !calendarExpanded;
    localStorage.setItem(CAL_EXPANDED_KEY, calendarExpanded ? '1' : '0');
    syncCalendarExpandBtn();
    renderCalendar({ scrollToThisWeek: true });
  });
  syncCalendarExpandBtn();

  // 캘린더 클릭&드래그로 좌우 스크롤 — 미세 조정은 휠/트랙패드, 큰 이동은 드래그
  (function setupCalendarDragScroll(){
    const wrap = document.querySelector('.calendar-wrap');
    if (!wrap) return;
    const DRAG_THRESHOLD = 5; // 이 이상 움직여야 드래그로 간주, 그 이하는 클릭
    let isDown = false, didDrag = false, startX = 0, startScroll = 0;

    wrap.addEventListener('mousedown', (e) => {
      if (e.button !== 0) return; // 좌클릭만
      // 입력/선택 요소는 드래그 시작 안 함
      if (e.target.closest('input, button, select, textarea, a')) return;
      isDown = true; didDrag = false;
      startX = e.pageX; startScroll = wrap.scrollLeft;
    });

    document.addEventListener('mousemove', (e) => {
      if (!isDown) return;
      const dx = e.pageX - startX;
      if (!didDrag && Math.abs(dx) >= DRAG_THRESHOLD){
        didDrag = true;
        wrap.classList.add('is-dragging');
      }
      if (didDrag){
        wrap.scrollLeft = startScroll - dx;
        e.preventDefault();
      }
    });

    document.addEventListener('mouseup', () => {
      if (!isDown) return;
      if (didDrag){
        // 드래그 직후 발생할 click 이벤트 1회 차단 — task bar가 잘못 열리지 않도록
        const blocker = (ev) => { ev.stopPropagation(); ev.preventDefault(); };
        document.addEventListener('click', blocker, { capture:true, once:true });
        // 안전장치: click이 발생하지 않은 경우(드물게) 다음 tick에 정리
        setTimeout(() => document.removeEventListener('click', blocker, true), 0);
      }
      isDown = false; didDrag = false;
      wrap.classList.remove('is-dragging');
    });
  })();
  function bindSortSelects({ fieldId, dirId, fieldKey, dirKey, getField, getDir, setField, setDir, onChange }){
    const fieldSel = document.getElementById(fieldId);
    const dirSel = document.getElementById(dirId);
    if (fieldSel){
      fieldSel.value = getField();
      fieldSel.addEventListener('change', e => {
        setField(e.target.value);
        try { localStorage.setItem(fieldKey, getField()); } catch(_){}
        onChange();
      });
    }
    if (dirSel){
      dirSel.value = getDir();
      dirSel.addEventListener('change', e => {
        setDir(e.target.value);
        try { localStorage.setItem(dirKey, getDir()); } catch(_){}
        onChange();
      });
    }
  }
  bindSortSelects({
    fieldId: 'all-sort-field', dirId: 'all-sort-dir',
    fieldKey: ALL_SORT_FIELD_KEY, dirKey: ALL_SORT_DIR_KEY,
    getField: () => allSortField, getDir: () => allSortDir,
    setField: v => { allSortField = v; }, setDir: v => { allSortDir = v; },
    onChange: () => renderAllTasks()
  });
  bindSortSelects({
    fieldId: 'tw-sort-field', dirId: 'tw-sort-dir',
    fieldKey: TW_SORT_FIELD_KEY, dirKey: TW_SORT_DIR_KEY,
    getField: () => twSortField, getDir: () => twSortDir,
    setField: v => { twSortField = v; }, setDir: v => { twSortDir = v; },
    onChange: () => renderThisWeek()
  });
  // 레거시 키 정리 (기존 단일 드롭다운 값이 로컬에 남아있다면 제거)
  try { localStorage.removeItem('kar_all_sort_v1'); } catch(_){}
  document.getElementById('tw-collapse-btn').addEventListener('click', () => setTwCollapsed(!twCollapsed));
  function setTwCollapsed(collapsed){
    twCollapsed = collapsed;
    const section = document.getElementById('tw-section');
    section.classList.toggle('is-collapsed', collapsed);
    const btn = document.getElementById('tw-collapse-btn');
    btn.setAttribute('aria-expanded', String(!collapsed));
    const label = document.getElementById('tw-collapse-label');
    if (label) label.textContent = collapsed ? '펼치기' : '접기';
    // 접을 때 편집 모드였던 항목 정리
    if (collapsed) editingTwIds.clear();
  }

  document.getElementById('btn-connect').addEventListener('click', connectExcelFile);
  document.getElementById('btn-save').addEventListener('click', saveToConnectedFile);
  document.getElementById('btn-export-new').addEventListener('click', exportAsNewFile);

  // Sheet tab switching
  document.querySelectorAll('.view-tab').forEach(btn => {
    btn.addEventListener('click', () => setView(btn.dataset.view));
  });
  // Annual year navigation
  document.getElementById('a-prev-year').addEventListener('click', () => changeAnnualYear(-1));
  document.getElementById('a-next-year').addEventListener('click', () => changeAnnualYear(1));
  document.getElementById('add-annual-row-btn').addEventListener('click', addAnnualProjectRow);
  document.querySelectorAll('.tw-week-toggle-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      twSelectedWeek = btn.dataset.twWeek;
      editingTwIds.clear();
      document.querySelectorAll('.tw-week-toggle-btn').forEach(b => {
        b.classList.toggle('is-active', b.dataset.twWeek === twSelectedWeek);
      });
      renderMonthHeader();
      renderThisWeek();
    });
  });

  // Keyboard shortcuts
  document.addEventListener('keydown', (e) => {
    // Ctrl/Cmd + S : save
    if ((e.ctrlKey || e.metaKey) && e.key === 's'){
      e.preventDefault();
      if (fileHandle && FS_API_SUPPORTED) saveToConnectedFile();
      else if (FS_API_SUPPORTED) showToast('먼저 📂 엑셀 파일 연결을 해주세요', 'error');
      return;
    }
    // Modal open: 다른 핸들러가 동작하지 않도록 차단 (ESC 닫기는 비활성화 — 실수 방지)
    if (document.getElementById('task-modal').classList.contains('is-open')){
      return;
    }
    if (document.getElementById('annual-bar-modal').classList.contains('is-open')){
      return;
    }
  });

  // Warn before leaving if unsaved
  window.addEventListener('beforeunload', (e) => {
    if (isDirty && fileHandle){
      e.preventDefault();
      e.returnValue = '';
    }
  });

  renderMonthHeader();
  renderCalendar({ scrollToThisWeek: true }); // 초기 로드 시 오늘 일자(이번주)로 자동 스크롤
  renderThisWeek();
  setTwCollapsed(true); // 기본 접힘 상태로 시작
  setView(currentView); // 마지막으로 본 시트 탭 복원
  restoreFileHandle();
})();
</script>
</body>
</html>
