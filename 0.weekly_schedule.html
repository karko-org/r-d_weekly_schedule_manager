<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KAR 업무 일정 캘린더</title>
<link rel="preconnect" href="https://cdn.jsdelivr.net">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">
<script src="https://cdn.jsdelivr.net/npm/xlsx-js-style@1.2.0/dist/xlsx.bundle.js"></script>
<script src="https://cdn.jsdelivr.net/npm/fflate@0.8.2/umd/index.js"></script>
<script src="https://cdn.jsdelivr.net/npm/idb-keyval@6/dist/umd.js"></script>
<style>
  :root{
    --bg:#f5f2ea;
    --surface:#fffdf8;
    --ink:#1a1814;
    --ink-2:#3a3631;
    --muted:#8a8478;
    --line:#d8d2c4;
    --line-soft:#ebe6d9;
    --accent:#8b4513;
    --accent-soft:#f3e8d8;
    --accent-mid:#d4a44c;
    --this-week:#fef4e8;
    --this-week-border:#d4a44c;
    --this-week-border-soft:#e8c88a;
    --today:#c0392b;
    --weekend:#f0ede3;
    --sunday:#f5e9e9;
    --bar-bg:#e8dcc4;
    --bar-ink:#5c3d1a;
    --bar-accent-bg:#d4a44c;
    --bar-accent-ink:#3a2a0a;
    --success:#2d7a4a;
    --success-bg:#e6f3eb;
    --mono:'JetBrains Mono','SF Mono',ui-monospace,monospace;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{font-family:'Pretendard',system-ui,sans-serif;color:var(--ink);background:var(--bg);font-feature-settings:"ss06","kern";-webkit-font-smoothing:antialiased}
  button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
  input{font-family:inherit;color:inherit}

  #input-view{max-width:1400px;margin:0 auto;padding:28px 32px 60px}

  .app-header{display:flex;align-items:center;justify-content:space-between;padding-bottom:20px;border-bottom:1px solid var(--line);margin-bottom:24px;gap:16px;flex-wrap:wrap}
  .brand{display:flex;align-items:baseline;gap:14px}
  .brand-mark{font-weight:800;font-size:24px;letter-spacing:-0.02em;color:var(--accent);font-family:var(--mono)}
  .brand-title{font-size:17px;color:var(--ink-2);letter-spacing:-0.01em}
  .version{font-family:var(--mono);font-size:11px;color:var(--muted);background:var(--surface);padding:4px 10px;border:1px solid var(--line);border-radius:999px;letter-spacing:0.02em}

  /* File status indicator */
  .file-status{display:flex;align-items:center;gap:10px;padding:8px 14px;border-radius:8px;font-size:12px;font-family:var(--mono);border:1px solid var(--line);background:var(--surface);transition:all .15s}
  .file-status.is-connected{background:var(--success-bg);border-color:var(--success);color:var(--success)}
  .file-status.is-unsupported{background:var(--this-week);border-color:var(--this-week-border);color:var(--bar-accent-ink)}
  .file-status-text{font-weight:600;letter-spacing:-0.01em}
  .file-status-name{color:var(--muted);font-weight:500;max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .file-status.is-connected .file-status-name{color:var(--ink-2)}
  .disconnect-btn{font-size:11px;color:var(--muted);padding:3px 8px;border-radius:4px;border:1px solid transparent;transition:all .15s;margin-left:4px}
  .disconnect-btn:hover{color:var(--today);border-color:var(--today);background:var(--surface)}

  .month-control{display:flex;align-items:center;gap:14px;margin-bottom:20px;padding:16px 22px;background:var(--surface);border:1px solid var(--line);border-radius:12px;flex-wrap:wrap}
  .nav-btn{width:36px;height:36px;border-radius:8px;font-size:13px;color:var(--ink-2);border:1px solid var(--line);background:var(--bg);transition:all .15s}
  .nav-btn:hover{border-color:var(--ink);color:var(--ink)}
  .month-display{flex:1;text-align:center;min-width:180px}
  .month-label{font-size:11px;letter-spacing:0.14em;color:var(--muted);text-transform:uppercase;margin-bottom:4px;font-weight:500}
  .month-title{font-size:22px;font-weight:700;color:var(--ink);letter-spacing:-0.01em;font-feature-settings:"tnum"}
  .reset-btn{font-size:12px;color:var(--accent);padding:8px 14px;border:1px solid var(--accent);border-radius:8px;transition:all .15s}
  .reset-btn:hover{background:var(--accent);color:var(--surface)}
  .add-log-btn{padding:10px 18px;font-size:13px;font-weight:700;color:var(--surface);background:var(--accent);border-radius:8px;transition:all .15s;letter-spacing:-0.01em;font-family:inherit;white-space:nowrap}
  .add-log-btn:hover{background:var(--ink)}
  .cal-expand-btn{padding:10px 14px;font-size:13px;font-weight:600;color:var(--ink-2);background:var(--bg);border:1px solid var(--line);border-radius:8px;transition:all .15s;white-space:nowrap;font-family:inherit}
  .cal-expand-btn:hover{border-color:var(--ink);color:var(--ink)}
  .cal-expand-btn[aria-pressed="true"]{background:var(--accent-mid);color:var(--bar-accent-ink);border-color:var(--accent-mid)}

  .calendar-wrap{background:var(--surface);border:1px solid var(--line);border-radius:12px;padding:16px;margin-bottom:22px;overflow-x:auto}
  /* 드래그로 좌우 스크롤 — 펼치기 모드에서만 grab 커서 노출 */
  .calendar-wrap:has(.calendar.is-expanded){cursor:grab}
  .calendar-wrap.is-dragging{cursor:grabbing!important;user-select:none}
  .calendar-wrap.is-dragging .cal-task-bar{cursor:grabbing!important}
  .calendar{display:grid;gap:0;min-width:800px}
  .cal-corner{grid-column:1;grid-row:1 / span 2;background:var(--bg);border:1px solid var(--line-soft);display:flex;align-items:center;justify-content:center;font-size:11px;color:var(--muted);text-align:center;padding:6px;line-height:1.3;white-space:pre}
  .cal-day-num{grid-row:1;border:1px solid var(--line-soft);padding:8px 2px;text-align:center;font-family:var(--mono);font-size:12px;font-weight:600;color:var(--ink-2);background:var(--bg)}
  .cal-day-num.is-highlight{background:var(--this-week);color:var(--bar-accent-ink)}
  .cal-day-num.is-today{background:var(--today);color:#fff}
  .cal-weekday{grid-row:2;border:1px solid var(--line-soft);padding:6px 2px;text-align:center;font-size:11px;color:var(--ink-2);background:var(--surface)}
  .cal-weekday.is-sat{color:#2a6b9c;background:#edf3f8}
  .cal-weekday.is-sun{color:#c0392b;background:var(--sunday)}
  .cal-weekday.is-highlight{background:var(--this-week);color:var(--bar-accent-ink);font-weight:600}
  .cal-weekday.is-today{background:var(--today);color:#fff;font-weight:700}
  .cal-bg{border:1px solid var(--line-soft);background:var(--surface);min-height:38px}
  .cal-bg.is-weekend{background:var(--weekend)}
  .cal-bg.is-sunday{background:var(--sunday)}
  .cal-bg.is-highlight{background:var(--this-week)}
  /* 펼치기 모드에서 표시되는 전달/다음달 셀 — 시각적으로 흐리게 */
  .cal-day-num.is-other-month{opacity:0.5;background:var(--bg);color:var(--muted)}
  .cal-weekday.is-other-month{opacity:0.5;background:var(--bg)}
  .cal-bg.is-other-month{background:var(--bg);opacity:0.7}
  /* 다른 달의 1일 셀에는 작게 월 표시 */
  .cal-day-num.is-month-start::after{content:attr(data-month);display:block;font-size:9px;opacity:0.7;margin-top:1px}
  .cal-task-bar{display:flex;align-items:center;gap:6px;padding:4px 8px;font-size:12px;font-weight:500;background:#ffffff;color:var(--ink);border-radius:6px;margin:3px 2px;min-height:30px;border:1px solid var(--line);transition:all .15s;cursor:pointer;z-index:1;position:relative}
  .cal-task-bar:hover{background:var(--bar-accent-bg);color:var(--bar-accent-ink);z-index:2}
  .cal-task-bar.is-focused{box-shadow:0 0 0 2px var(--today)}
  /* 원본 엑셀 색상이 있는 월간 바는 호버 시에도 색상 유지 */
  .cal-task-bar.has-custom-color:hover{filter:brightness(0.92);box-shadow:0 2px 8px rgba(0,0,0,0.15);z-index:2}
  .cal-task-bar.has-custom-color.is-focused{box-shadow:0 0 0 2px var(--today)}
  /* 바 내부 텍스트 — 한 줄 + ellipsis (truncate 책임) */
  .cal-task-text{overflow:hidden;white-space:nowrap;text-overflow:ellipsis;flex:1;min-width:0}
  /* Hover 툴팁 — body 직속 singleton, calendar-wrap clipping 회피 */
  .cal-tip{position:fixed;top:0;left:0;background:var(--surface);color:var(--ink);padding:10px 14px;border-radius:8px;border:1px solid var(--line);font-size:12px;font-weight:500;font-family:inherit;white-space:pre-wrap;max-width:360px;word-break:keep-all;box-shadow:0 8px 24px rgba(60,40,20,0.12);z-index:1000;pointer-events:none;line-height:1.5;opacity:0;visibility:hidden;transition:opacity .12s, visibility 0s .12s}
  .cal-tip.is-visible{opacity:1;visibility:visible;transition:opacity .12s, visibility 0s}
  /* 완료 체크박스 (task bar 좌측 + 리스트 좌측 공용) */
  .done-toggle{display:inline-flex;align-items:center;justify-content:center;width:16px;height:16px;border:1.5px solid var(--muted);border-radius:4px;background:transparent;color:transparent;font-size:11px;font-weight:900;line-height:1;flex:0 0 16px;transition:all .12s;cursor:pointer}
  .done-toggle:hover{border-color:var(--ink);background:rgba(255,255,255,0.5)}
  .done-toggle.is-checked{background:var(--success);border-color:var(--success);color:#fff}
  .done-toggle.is-checked::before{content:"\2713"}
  /* 완료 처리된 task bar / 리스트 항목 — 취소선 + 회색 톤 */
  .cal-task-bar.is-done{opacity:0.55;filter:grayscale(0.7);text-decoration:line-through;text-decoration-thickness:1.5px}
  .cal-task-bar.is-done:hover{opacity:0.9}
  .tw-item.is-done .tw-title-input{text-decoration:line-through;text-decoration-thickness:1.5px;color:var(--muted)}
  .tw-item.is-done{opacity:0.7;background:#f5f3ed}
  .tw-item.is-done .tw-edit:disabled,
  .tw-item.is-done .task-remove:disabled{opacity:0.35;cursor:not-allowed}
  .tw-item.is-done .tw-day-input:disabled{opacity:0.5;cursor:not-allowed;background:transparent}
  .tw-item.is-done .tw-title-input[readonly]{cursor:default;background:transparent}
  /* 모달 안의 완료 체크박스 */
  .modal-done-row{display:flex;align-items:center;gap:8px;padding:8px 12px;background:var(--bg);border:1px solid var(--line-soft);border-radius:8px;cursor:pointer;user-select:none;transition:all .12s}
  .modal-done-row:hover{border-color:var(--muted)}
  .modal-done-row.is-checked{background:var(--success-bg);border-color:var(--success)}
  .modal-done-row .modal-done-text{font-size:13px;font-weight:600;color:var(--ink-2)}
  .modal-done-row.is-checked .modal-done-text{color:var(--success)}

  .tw-section{background:var(--this-week);border:1px solid var(--this-week-border);border-radius:12px;padding:18px 22px;margin-bottom:14px;transition:padding .15s}
  .tw-section.is-collapsed{padding-bottom:14px}
  .tw-section.is-collapsed .tw-header{margin-bottom:0;padding-bottom:0;border-bottom:none}
  .tw-section.is-collapsed .tw-list{display:none}
  .tw-header-right{display:flex;align-items:center;gap:12px}
  .tw-collapse-btn{color:var(--muted);font-size:12px;padding:6px 12px;border-radius:6px;border:1px solid transparent;transition:all .15s;display:inline-flex;align-items:center;gap:6px;font-family:inherit;font-weight:500}
  .tw-collapse-btn:hover{color:var(--ink);background:var(--surface);border-color:var(--this-week-border-soft)}
  .tw-collapse-btn .chevron{display:inline-block;transition:transform 0.2s;font-size:9px}
  .tw-section:not(.is-collapsed) .tw-collapse-btn .chevron{transform:rotate(90deg)}
  .tw-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;padding-bottom:12px;border-bottom:1px solid var(--this-week-border-soft);gap:10px;flex-wrap:wrap}
  .tw-title-group{display:flex;align-items:center;gap:12px;flex-wrap:wrap}
  .tw-badge{display:inline-block;padding:5px 12px;background:var(--accent-mid);color:var(--bar-accent-ink);font-size:11px;font-weight:700;letter-spacing:0.1em;border-radius:4px;font-family:var(--mono);text-transform:uppercase;transition:background .15s}
  .tw-range{font-family:var(--mono);font-size:14px;font-weight:600;color:var(--ink);font-feature-settings:"tnum"}
  /* Inline week toggle (input view) */
  .tw-week-toggle{display:inline-flex;background:rgba(255,253,248,0.6);border:1px solid var(--this-week-border-soft);border-radius:8px;padding:2px}
  .tw-week-toggle-btn{padding:6px 14px;font-size:12px;font-weight:600;color:var(--muted);border-radius:6px;transition:all .15s;letter-spacing:-0.01em;font-family:inherit}
  .tw-week-toggle-btn:hover{color:var(--ink)}
  .tw-week-toggle-btn.is-active{background:var(--accent-mid);color:var(--bar-accent-ink)}
  .tw-week-toggle-btn.is-active:hover{color:var(--bar-accent-ink)}
  .task-count{font-family:var(--mono);font-size:12px;color:var(--muted);font-weight:500}
  .tw-list{display:flex;flex-direction:column;gap:6px}
  .tw-item{display:grid;grid-template-columns:22px 1fr 140px 28px 28px;gap:10px;align-items:center;padding:10px 12px;border-radius:8px;background:var(--surface);border:1px solid transparent;transition:all .12s}
  .tw-item:focus-within{border-color:var(--accent)}
  .tw-item.is-editing{border-color:var(--accent);background:var(--accent-soft)}
  .tw-title-input{font-size:14px;padding:8px 10px;border:1px solid transparent;background:var(--bg);border-radius:6px;font-weight:500}
  .tw-title-input:focus{outline:none;border-color:var(--line);background:var(--surface)}
  .tw-dates-cell{text-align:center}
  .tw-dates{font-family:var(--mono);font-size:12px;color:var(--ink-2);text-align:center;letter-spacing:-0.01em;font-feature-settings:"tnum"}
  .tw-dates-edit{display:none;align-items:center;justify-content:center;gap:4px}
  .tw-item.is-editing .tw-dates{display:none}
  .tw-item.is-editing .tw-dates-edit{display:flex}
  .tw-day-input{font-family:var(--mono);font-size:13px;padding:6px;border:1px solid var(--line);background:var(--surface);border-radius:6px;text-align:center;width:48px;font-feature-settings:"tnum";color:inherit}
  .tw-day-input:focus{outline:none;border-color:var(--accent)}
  .tw-dates-sep{color:var(--muted);font-size:12px}
  .tw-edit{color:var(--muted);font-size:14px;line-height:1;padding:4px;border-radius:4px;transition:all .15s}
  .tw-edit:hover{color:var(--accent);background:var(--bg)}
  .tw-item.is-editing .tw-edit{color:var(--success);font-weight:700;font-size:16px}
  .tw-item.is-editing .tw-edit:hover{color:#256539;background:var(--success-bg)}
  .tw-empty{text-align:center;padding:18px;color:var(--muted);font-size:13px;font-style:italic}
  .task-remove{color:var(--muted);font-size:18px;line-height:1;padding:4px;border-radius:4px;transition:all .15s}
  .task-remove:hover{color:var(--today);background:var(--bg)}

  .all-section{background:var(--surface);border:1px solid var(--line);border-radius:12px;padding:18px 22px;margin-bottom:22px;transition:padding .15s}
  .all-section.is-collapsed{padding-bottom:14px}
  .all-section.is-collapsed .tw-header{margin-bottom:0;padding-bottom:0;border-bottom:none}
  .all-section.is-collapsed .all-content{display:none}
  .all-section:not(.is-collapsed) .tw-collapse-btn .chevron{transform:rotate(90deg)}
  .sort-select{font-family:inherit;font-size:12px;padding:5px 28px 5px 10px;background:var(--bg);border:1px solid var(--line);border-radius:6px;color:var(--ink-2);cursor:pointer;appearance:none;-webkit-appearance:none;background-image:linear-gradient(45deg, transparent 50%, var(--muted) 50%), linear-gradient(135deg, var(--muted) 50%, transparent 50%);background-position:calc(100% - 14px) 50%, calc(100% - 10px) 50%;background-size:4px 4px, 4px 4px;background-repeat:no-repeat}
  .sort-select:hover{border-color:var(--ink-2);color:var(--ink)}
  .sort-select:focus{outline:none;border-color:var(--accent)}
  .all-section.is-collapsed .sort-select,
  .tw-section.is-collapsed .sort-select{display:none}
  .chevron{display:inline-block;transition:transform 0.2s;font-size:10px;color:var(--muted);width:12px}
  .all-content{padding-top:4px}
  .task-list{display:flex;flex-direction:column;gap:6px}
  .add-task-btn{margin-top:10px;padding:11px;font-size:13px;color:var(--muted);border:1px dashed var(--line);border-radius:8px;transition:all .15s;width:100%}
  .add-task-btn:hover{color:var(--accent);border-color:var(--accent);border-style:solid;background:var(--accent-soft)}

  .actions{display:flex;gap:12px;justify-content:flex-end;flex-wrap:wrap;align-items:center;position:sticky;top:0;z-index:10;background:var(--bg);padding:12px 0;margin-bottom:20px;border-bottom:1px solid var(--line-soft)}
  .actions-left{flex:1;display:flex;gap:10px;flex-wrap:wrap}
  .btn-secondary,.btn-primary,.btn-save{padding:13px 22px;font-size:14px;font-weight:600;border-radius:10px;transition:all .15s;letter-spacing:-0.01em}
  .btn-secondary{color:var(--ink);border:1px solid var(--line);background:var(--surface)}
  .btn-secondary:hover{border-color:var(--ink)}
  .btn-primary{color:var(--surface);background:var(--ink)}
  .btn-primary:hover{background:var(--accent)}
  .btn-save{color:var(--surface);background:var(--success);border:1px solid var(--success)}
  .btn-save:hover{background:#256539;border-color:#256539}
  .btn-save:disabled{background:var(--muted);border-color:var(--muted);cursor:not-allowed;opacity:0.6}
  .btn-save-secondary{color:var(--success);border:1px solid var(--success);background:var(--surface)}
  .btn-save-secondary:hover{background:var(--success-bg)}
  .btn-link{background:none;color:var(--muted);font-size:12px;text-decoration:underline;padding:6px 4px}
  .btn-link:hover{color:var(--ink)}

  .hint{margin-top:16px;font-size:12px;color:var(--muted);text-align:center;line-height:1.6}
  .hint kbd{font-family:var(--mono);font-size:11px;padding:2px 6px;background:var(--surface);border:1px solid var(--line);border-radius:4px;color:var(--ink-2)}

  .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);padding:12px 22px;background:var(--ink);color:var(--surface);border-radius:10px;font-size:13px;box-shadow:0 8px 24px rgba(0,0,0,.15);opacity:0;transition:opacity .2s;z-index:1000;pointer-events:none;max-width:80vw}
  .toast.is-visible{opacity:1}
  .toast.is-success{background:var(--success)}
  .toast.is-error{background:var(--today)}

  /* Task Detail Modal */
  .modal-overlay{position:fixed;inset:0;background:rgba(26,24,20,0.55);backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px);z-index:100;display:none;align-items:center;justify-content:center;padding:20px}
  .modal-overlay.is-open{display:flex;animation:modalFadeIn 0.15s ease-out}
  @keyframes modalFadeIn{from{opacity:0}to{opacity:1}}
  @keyframes modalSlideUp{from{transform:translateY(16px);opacity:0}to{transform:translateY(0);opacity:1}}
  .modal{background:var(--surface);border-radius:16px;box-shadow:0 20px 60px rgba(0,0,0,0.25);width:100%;max-width:680px;max-height:90vh;display:flex;flex-direction:column;animation:modalSlideUp 0.2s ease-out}
  .modal-header{display:flex;align-items:center;justify-content:space-between;padding:18px 24px;border-bottom:1px solid var(--line-soft)}
  .modal-title{font-size:12px;font-weight:700;color:var(--ink-2);letter-spacing:0.12em;text-transform:uppercase;font-family:var(--mono)}
  .modal-close{width:32px;height:32px;border-radius:8px;color:var(--muted);font-size:20px;line-height:1;transition:all .15s;font-family:inherit}
  .modal-close:hover{color:var(--ink);background:var(--bg)}
  .modal-body{padding:22px 24px;overflow-y:auto;flex:1;display:flex;flex-direction:column;gap:18px}
  .modal-field{display:flex;flex-direction:column;gap:6px}
  .modal-label{font-size:11px;font-weight:600;color:var(--muted);letter-spacing:0.08em;text-transform:uppercase}
  .modal-input{padding:11px 14px;font-size:15px;font-weight:500;border:1px solid var(--line);background:var(--bg);border-radius:8px;font-family:inherit;color:var(--ink);width:100%}
  .modal-input:focus{outline:none;border-color:var(--accent);background:var(--surface)}
  .modal-dates{display:flex;align-items:center;gap:10px;flex-wrap:nowrap}
  .modal-date-input{width:80px;padding:10px 12px;font-family:var(--mono);font-size:14px;text-align:center;border:1px solid var(--line);background:var(--bg);border-radius:8px;color:var(--ink);font-feature-settings:"tnum"}
  .modal-date-input:focus{outline:none;border-color:var(--accent);background:var(--surface)}

  .modal-date-picker:hover::-webkit-calendar-picker-indicator{opacity:1}
  .modal-dates-sep{color:var(--muted);font-size:14px}
  .modal-dates-display{font-size:13px;color:var(--muted);font-family:var(--mono);font-feature-settings:"tnum";white-space:nowrap;min-width:0;overflow:hidden;text-overflow:ellipsis}
  .modal-notes{padding:12px 14px;font-size:14px;line-height:1.6;border:1px solid var(--line);background:var(--bg);border-radius:8px;font-family:inherit;color:var(--ink);min-height:160px;resize:vertical;width:100%}
  .modal-notes:focus{outline:none;border-color:var(--accent);background:var(--surface)}
  .modal-footer{display:flex;justify-content:space-between;padding:14px 24px;border-top:1px solid var(--line-soft);gap:12px;align-items:center}
  .modal-hint{font-size:11px;color:var(--muted)}
  .modal-actions{display:flex;gap:10px}
  .modal-delete-btn{padding:10px 16px;font-size:13px;color:var(--today);border:1px solid var(--today);border-radius:8px;font-weight:600;transition:all .15s;background:var(--surface);font-family:inherit}
  .modal-delete-btn:hover{background:var(--today);color:var(--surface)}
  .modal-save-btn{padding:10px 22px;font-size:13px;color:var(--surface);background:var(--success);border:1px solid var(--success);border-radius:8px;font-weight:600;transition:all .15s;font-family:inherit}
  .modal-save-btn:hover{background:#256539;border-color:#256539}

  /* Color picker (annual bar modal) */
  .color-picker{display:flex;align-items:center;gap:14px;flex-wrap:wrap}
  .color-swatches{display:inline-flex;gap:6px;flex-wrap:wrap}
  .color-swatch{width:26px;height:26px;border-radius:6px;border:2px solid transparent;cursor:pointer;transition:all .12s;padding:0;font-family:inherit;position:relative}
  .color-swatch:hover{transform:scale(1.1);box-shadow:0 2px 6px rgba(0,0,0,.15)}
  .color-swatch.is-active{border-color:var(--ink);box-shadow:0 0 0 2px var(--surface) inset}
  .color-swatch.is-none{background:
    linear-gradient(45deg, transparent 46%, var(--today) 46%, var(--today) 54%, transparent 54%),
    var(--surface);
    border:1px dashed var(--line)}
  .color-swatch.is-none.is-active{border-color:var(--ink);border-style:solid}
  .color-custom{display:inline-flex;align-items:center;gap:6px;font-size:12px;color:var(--muted);cursor:pointer;padding:4px 8px;border:1px solid var(--line);border-radius:6px;background:var(--bg);transition:all .12s}
  .color-custom:hover{border-color:var(--ink-2);color:var(--ink-2)}
  .color-custom input[type=color]{width:24px;height:24px;padding:0;border:none;background:none;cursor:pointer;border-radius:4px}
  .color-custom input[type=color]::-webkit-color-swatch-wrapper{padding:0}
  .color-custom input[type=color]::-webkit-color-swatch{border:1px solid var(--line);border-radius:4px}

  /* Sheet tabs (monthly / annual) */
  .view-tabs{display:flex;gap:4px;margin-bottom:16px;border-bottom:1px solid var(--line);padding:0 4px}
  .view-tab{padding:12px 22px;font-size:14px;font-weight:600;color:var(--muted);border-bottom:2px solid transparent;margin-bottom:-1px;transition:all .15s;font-family:inherit;letter-spacing:-0.01em;display:inline-flex;align-items:center;gap:8px}
  .view-tab:hover{color:var(--ink-2)}
  .view-tab.is-active{color:var(--accent);border-bottom-color:var(--accent)}
  .view-tab-icon{font-size:15px}

  /* Annual (Sheet1) view */
  .annual-control{display:flex;align-items:center;gap:14px;margin-bottom:20px;padding:16px 22px;background:var(--surface);border:1px solid var(--line);border-radius:12px;flex-wrap:wrap}
  .annual-display{flex:1;text-align:center;min-width:220px}
  .annual-label{font-size:11px;letter-spacing:0.14em;color:var(--muted);text-transform:uppercase;margin-bottom:4px;font-weight:500}
  .annual-title{font-size:22px;font-weight:700;color:var(--ink);letter-spacing:-0.01em;font-feature-settings:"tnum"}
  .annual-wrap{background:var(--surface);border:1px solid var(--line);border-radius:12px;padding:16px;margin-bottom:14px;overflow-x:auto}
  .annual-grid{display:grid;gap:0;min-width:1400px}
  .annual-corner{grid-row:1 / span 3;grid-column:1;background:var(--bg);border:1px solid var(--line-soft);display:flex;align-items:center;justify-content:center;font-size:11px;color:var(--muted);padding:6px;white-space:pre;text-align:center}
  .annual-month-cell{grid-row:1;border:1px solid var(--line-soft);padding:8px 4px;text-align:center;font-family:var(--mono);font-size:13px;font-weight:700;color:var(--ink);background:var(--accent-soft)}
  .annual-weekinmonth{grid-row:2;border:1px solid var(--line-soft);padding:4px 2px;text-align:center;font-family:var(--mono);font-size:10px;color:var(--ink-2);background:var(--bg)}
  .annual-weeknum{grid-row:3;border:1px solid var(--line-soft);padding:4px 2px;text-align:center;font-family:var(--mono);font-size:10px;color:var(--muted);background:var(--surface)}
  .annual-rowlabel{border:1px solid var(--line-soft);padding:6px 8px;display:flex;align-items:center;justify-content:space-between;gap:6px;font-family:var(--mono);font-size:12px;font-weight:600;color:var(--ink-2);background:var(--bg);position:relative}
  .annual-rowlabel .row-remove{opacity:0;color:var(--muted);font-size:16px;line-height:1;padding:3px 5px;border-radius:4px;transition:all .15s}
  .annual-rowlabel:hover .row-remove{opacity:1}

<script>
(() => {
  const WEEKDAYS_KR = ['일','월','화','수','목','금','토'];
  const STORAGE_KEY = 'kar_monthly_schedule_v1';
  const FILE_HANDLE_KEY = 'kar_excel_file_handle_v1';
  const LAST_FILE_HANDLE_KEY = 'kar_last_excel_file_handle_v1'; // 초기화해도 유지되는 '마지막 위치' 힌트
  const ANNUAL_STORAGE_KEY = 'kar_annual_schedule_v1';
  const VIEW_KEY = 'kar_current_view_v1'; // 'monthly' | 'annual'
  const ANNUAL_YEAR_KEY = 'kar_current_annual_year_v1';
  const ALL_SORT_FIELD_KEY = 'kar_all_sort_field_v1'; // 'date' | 'title'
  const ALL_SORT_DIR_KEY = 'kar_all_sort_dir_v1';     // 'asc' | 'desc'
  const TW_SORT_FIELD_KEY = 'kar_tw_sort_field_v1';
  const TW_SORT_DIR_KEY = 'kar_tw_sort_dir_v1';
  const CAL_EXPANDED_KEY = 'kar_calendar_expanded_v1';
  const CAL_EXPANDED_DAY_WIDTH = 110; // 펼침 모드에서 날짜 셀 너비 (px)
  let calendarExpanded = localStorage.getItem(CAL_EXPANDED_KEY) === '1';

  const FS_API_SUPPORTED = 'showOpenFilePicker' in window && 'showSaveFilePicker' in window;

  const pad = n => String(n).padStart(2,'0');
  const fmtISO = d => `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
  const monthKey = (y,m) => `${y}-${pad(m+1)}`;
  function daysInMonth(y,m){ return new Date(y, m+1, 0).getDate(); }
  function weekdayOf(y,m,d){ return new Date(y,m,d).getDay(); }
  function addDays(d,n){ const x=new Date(d); x.setDate(x.getDate()+n); return x; }
  function getThisWeekMonday(from=new Date()){
    const d = new Date(from.getFullYear(),from.getMonth(),from.getDate());
    const day = d.getDay();
    const delta = day === 0 ? -6 : (1 - day);
    return addDays(d,delta);
  }
  function uid(){ return 't_' + Math.random().toString(36).slice(2,9); }
  function projUid(){ return 'p_' + Math.random().toString(36).slice(2,9); }
  function barUid(){ return 'b_' + Math.random().toString(36).slice(2,9); }

  const today = new Date();
  today.setHours(0,0,0,0);
  const todayY = today.getFullYear();
  const todayM = today.getMonth();
  const todayD = today.getDate();
  const thisMon = getThisWeekMonday();
  const thisFri = addDays(thisMon, 4);
  const lastMon = addDays(thisMon, -7);
  const lastFri = addDays(thisMon, -3);
  const nextMon = addDays(thisMon, 7);
  const nextFri = addDays(thisMon, 11);

  let currentYear = todayY;
  let currentMonth = todayM;
  let twSelectedWeek = 'this'; // 'last' | 'this' | 'next' — 주간 섹션 토글
  let twCollapsed = true; // 이번주/다음주 섹션 접힘 상태 — 기본 접힘
  const editingTwIds = new Set();

  function sortTasks(tasks, field, dir){
    const arr = [...tasks];
    if (field === 'title'){
      arr.sort((a,b) => (a.title||'').localeCompare(b.title||'', 'ko'));
    } else { // date
      arr.sort((a,b) => a.start - b.start || (a.title||'').localeCompare(b.title||'', 'ko'));
    }
    if (dir === 'desc') arr.reverse();
    return arr;
  }

  function sortResults(results, field, dir){
    const arr = [...results];
    if (field === 'title'){
      arr.sort((a,b) => (a.task.title||'').localeCompare(b.task.title||'', 'ko'));
    } else { // date
      arr.sort((a,b) => {
        const da = new Date(a.y, a.m, a.task.start);
        const db = new Date(b.y, b.m, b.task.start);
        return da - db || (a.task.title||'').localeCompare(b.task.title||'', 'ko');

  // Default monthWeeks: 52 weeks distributed across 12 months as 5,4,4,5,4,4,5,4,5,4,4,4
  function defaultMonthWeeks(){
    const pattern = [5,4,4,5,4,4,5,4,5,4,4,4];
    const result = [];
    let col = 1;
    for (let i = 0; i < 12; i++){
      result.push({ month: i+1, startCol: col, endCol: col + pattern[i] - 1, weekCount: pattern[i] });
      col += pattern[i];
    }
    return result;
  }
  function getOrCreateAnnual(year){

        totalWeeks: 52,
        monthWeeks: defaultMonthWeeks(),
        projects: []
      };
    }
    // 구형 데이터 복구
    const a = annualData[key];
    if (!a.monthWeeks || a.monthWeeks.length === 0) a.monthWeeks = defaultMonthWeeks();
    if (!a.totalWeeks) a.totalWeeks = 52;
    if (!a.projects) a.projects = [];

  function showToast(msg, variant='', duration=2600){

  function assignRows(tasks){
    const sorted = [...tasks].sort((a,b) => a.start - b.start || a.end - b.end);
    const rows = [];
    sorted.forEach(t => {
      let placed = false;
      for (let i = 0; i < rows.length; i++){
        if (rows[i] < t.start){ t._row = i; rows[i] = t.end; placed = true; break; }
      }
      if (!placed){ t._row = rows.length; rows.push(t.end); }
    });
    return { rowCount: Math.max(1, rows.length), ordered: sorted };
  }

  function isInRange(y,m,d, startDate, endDate){
    const dt = new Date(y,m,d); dt.setHours(0,0,0,0);
    return dt >= startDate && dt <= endDate;

  function taskOverlapsRange(t, y, m, startDate, endDate){
    const taskStart = new Date(y, m, t.start);
    const taskEnd = new Date(y, m, t.end);

  async function connectExcelFile(){
    if (!FS_API_SUPPORTED){
      alert('이 브라우저는 파일 연결 기능을 지원하지 않습니다.\nChrome 또는 Edge 최신 버전을 사용해주세요.');
      return;
    }
    try {
      const opts = {
        id: 'kar-excel-folder', // 브라우저가 이 id로 마지막 위치를 기억
        types: [{
          description: 'Excel files',
          accept: { 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet': ['.xlsx'] }
        }],
        multiple: false
      };
      // 이전에 연결한 파일(또는 마지막으로 선택한 파일)이 있으면 그 폴더에서 열기
      if (fileHandle) opts.startIn = fileHandle;
      else if (lastFileHandle) opts.startIn = lastFileHandle;

      let handle;
      try {
        [handle] = await window.showOpenFilePicker(opts);
      } catch(innerErr){
        if (innerErr.name === 'AbortError') return;
        // startIn 파일 핸들이 유효하지 않으면 한번 더 시도 (예: 파일이 삭제됨)
        if (opts.startIn){
          delete opts.startIn;
          try { [handle] = await window.showOpenFilePicker(opts); }
          catch(retryErr){
            if (retryErr.name === 'AbortError') return;
            throw retryErr;
          }
        } else {
          throw innerErr;
        }
      }

      // Read the file first to import existing data
      const file = await handle.getFile();
      const ab = await file.arrayBuffer();
      const importResult = tryImportExcel(ab, file.name);
      const monthlyCount = importResult.monthly.count;
      const annualCount = importResult.annual.count;
      const totalCount = monthlyCount + annualCount;

      // 파일 선택 = 그 파일 내용으로 교체 (추가 confirm 없음)
      if (totalCount > 0){
        // 월간 가져오기
        monthData = {};
        Object.entries(importResult.monthly.parsed).forEach(([key, tasks]) => {
          if (!monthData[key]) monthData[key] = { tasks: [] };
          tasks.forEach(t => {
            monthData[key].tasks.push({ id: uid(), title: t.title, start: t.start, end: t.end, notes: t.notes || '', color: t.color || null, done: !!t.done });
          });
        });
        try{ localStorage.setItem(STORAGE_KEY, JSON.stringify(monthData)); }catch(e){}
        // 월간이 있으면: 오늘 달에 task가 있으면 오늘 달로, 없으면 가장 이른 월로 이동
        const importedMonths = Object.keys(importResult.monthly.parsed).filter(k => importResult.monthly.parsed[k].length > 0).sort();
        if (importedMonths.length > 0){
          const todayKey = monthKey(todayY, todayM);
          if (importedMonths.includes(todayKey)){
            currentYear = todayY; currentMonth = todayM;
          } else {
            const [y,m] = importedMonths[0].split('-').map((v,i) => i===0 ? parseInt(v,10) : parseInt(v,10)-1);
            currentYear = y; currentMonth = m;
          }
        }
        // 연간 가져오기
        if (importResult.annual.parsed){
          const a = importResult.annual.parsed;
          const yearKey = String(a.year);
          annualData = {}; // 교체 모드에서는 전체 교체
          annualData[yearKey] = a;
          currentAnnualYear = a.year;
          try{ localStorage.setItem(ANNUAL_STORAGE_KEY, JSON.stringify(annualData)); }catch(e){}
          try{ localStorage.setItem(ANNUAL_YEAR_KEY, String(a.year)); }catch(e){}
        } else {
          annualData = {};
          try{ localStorage.setItem(ANNUAL_STORAGE_KEY, '{}'); }catch(e){}
        }
      }

      // Save handle to IndexedDB for persistence
      fileHandle = handle;
      lastFileHandle = handle;
      try {
        if (window.idbKeyval){
          await window.idbKeyval.set(FILE_HANDLE_KEY, handle);
          await window.idbKeyval.set(LAST_FILE_HANDLE_KEY, handle);
        }
      } catch(e){ console.warn('Could not persist file handle:', e); }

      isDirty = false;
      renderFileStatus();
      renderMonthHeader();
      renderCalendar();
      renderThisWeek();
      if (allSectionOpen) renderAllTasks();
      if (currentView === 'annual') renderAnnual();

      if (totalCount > 0){
        const parts = [];
        if (monthlyCount > 0) parts.push(`월간 ${monthlyCount}개`);
        if (annualCount > 0) parts.push(`연간 ${annualCount}개`);
        showToast(`✓ "${file.name}" 연결됨 · ${parts.join(', ')} 불러옴`, 'success');
      } else {
        showToast(`✓ "${file.name}" 연결됨 (빈 파일)`, 'success');
      }
    } catch(err){
      if (err.name === 'AbortError') return; // user cancelled
      console.error(err);
      alert('파일 연결 중 오류: ' + err.message);
    }
  }

  async function disconnectFile(){
    const hasMonthly = Object.values(monthData).some(md => (md.tasks||[]).length > 0);
    const hasAnnual = Object.values(annualData).some(a => (a.projects||[]).some(p => (p.bars||[]).length > 0));
    const hasData = hasMonthly || hasAnnual;

    let msg = null;
    if (isDirty && fileHandle){
      msg = '저장되지 않은 변경사항이 있습니다. 파일 연결을 해제하고 화면의 모든 일정을 초기화하시겠습니까?\n\n(엑셀 파일에 반영되지 않은 데이터는 사라집니다)';
    } else if (hasData){
      msg = '파일 연결을 해제하고 화면의 모든 일정을 초기화하시겠습니까?';
    }
    if (msg && !confirm(msg)) return;

    // 파일 핸들 제거
    fileHandle = null;
    try { if (window.idbKeyval) await window.idbKeyval.del(FILE_HANDLE_KEY); }catch(e){}

    // 데이터 초기화
    monthData = {};
    annualData = {};
    try { localStorage.removeItem(STORAGE_KEY); } catch(e){}
    try { localStorage.removeItem(ANNUAL_STORAGE_KEY); } catch(e){}
    try { localStorage.removeItem(ANNUAL_YEAR_KEY); } catch(e){}

    // 뷰 상태 리셋
    focusedTaskId = null;
    focusedBarId = null;
    currentYear = todayY;
    currentMonth = todayM;
    currentAnnualYear = new Date().getFullYear();
    twSelectedWeek = 'this';
    isDirty = false;

    // 주간 토글 버튼 UI 동기화
    document.querySelectorAll('.tw-week-toggle-btn').forEach(b => {
      b.classList.toggle('is-active', b.dataset.twWeek === 'this');

    // 재렌더
    renderFileStatus();
    renderMonthHeader();
    renderCalendar();
    renderThisWeek();
    if (allSectionOpen) renderAllTasks();
    if (currentView === 'annual') renderAnnual();
    showToast('초기화되었습니다', 'success');
  }

  async function ensurePermission(handle, mode='readwrite', interactive=true){
    if (!handle.queryPermission || !handle.requestPermission) return true;
    const options = { mode };
    let perm = await handle.queryPermission(options);
    if (perm === 'granted') return true;
    // 자동 저장 등 비대화형 컨텍스트에서는 prompt 띄우지 않고 조용히 실패
    if (!interactive) return false;
    perm = await handle.requestPermission(options);
    return perm === 'granted';
  }

  async function saveToConnectedFile(opts = {}){
    if (!fileHandle){
      if (!opts.silent) showToast('먼저 파일을 연결해주세요', 'error');
      return;
    }
    try {
      const ok = await ensurePermission(fileHandle, 'readwrite', !opts.silent);
      if (!ok){
        if (!opts.silent) showToast('파일 쓰기 권한이 거부됐습니다', 'error');
        return;
      }
      const buf = buildExcelBuffer();
      const writable = await fileHandle.createWritable();
      await writable.write(buf);
      await writable.close();
      isDirty = false;
      renderFileStatus();
      const now = new Date();
      const timeStr = `${pad(now.getHours())}:${pad(now.getMinutes())}:${pad(now.getSeconds())}`;
      if (opts.silent) showToast(`자동 저장됨 · ${timeStr}`, 'success', 1100);
      else showToast(`저장됨 · ${timeStr}`, 'success');
    } catch(err){
      console.error(err);
      if (err.name === 'NotAllowedError'){
        showToast('파일 접근 권한이 거부됐습니다. 파일을 다시 연결해주세요', 'error', 4000);
      } else if (!opts.silent){
        showToast('저장 실패: ' + err.message, 'error', 4000);
      }
    }
  }

  async function exportAsNewFile(){
    const monthKeys = Object.keys(monthData).filter(k => (monthData[k].tasks || []).length > 0);
    const hasAnnual = Object.values(annualData).some(a => a && (a.projects || []).some(p => (p.bars || []).length > 0));
    if (monthKeys.length === 0 && !hasAnnual){
      alert('입력된 업무가 없습니다.');
      return;
    }
    const buf = buildExcelBuffer();
    const fname = '업무일정.xlsx';

    if (FS_API_SUPPORTED){
      try {
        const saveOpts = {
          id: 'kar-excel-folder', // 연결된 파일과 같은 폴더 기억 공유
          suggestedName: fname,
          types: [{ description: 'Excel', accept: { 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet': ['.xlsx'] }}]
        };
        if (fileHandle) saveOpts.startIn = fileHandle;
        else if (lastFileHandle) saveOpts.startIn = lastFileHandle;
        const handle = await window.showSaveFilePicker(saveOpts);
        const writable = await handle.createWritable();
        await writable.write(buf);
        await writable.close();
        // 마지막 위치 힌트 업데이트
        lastFileHandle = handle;
        try { if (window.idbKeyval) await window.idbKeyval.set(LAST_FILE_HANDLE_KEY, handle); } catch(e){}
        showToast('새 파일로 저장됨', 'success');
      } catch(err){
        if (err.name === 'AbortError') return;
        console.error(err);
        alert('저장 실패: ' + err.message);
      }
    } else {
      // fallback for other browsers
      const blob = new Blob([buf], { type: 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url; a.download = fname; a.click();
      URL.revokeObjectURL(url);
    }
  }

  function renderFileStatus(){

    const saveBtn = document.getElementById('btn-save');

    if (!FS_API_SUPPORTED){
      el.className = 'file-status is-unsupported';
      el.innerHTML = `<span class="file-status-text">이 브라우저는 저장 기능 미지원</span><span class="file-status-name">Chrome/Edge 권장</span>`;
      document.getElementById('btn-connect').disabled = true;
      document.getElementById('btn-connect').style.display = 'none';
      saveBtn.disabled = true;
      saveBtn.style.display = 'none';

    if (!fileHandle){

      el.className = 'file-status is-connected';
      const name = fileHandle.name || 'file.xlsx';
      el.innerHTML = `
        
        <span class="file-status-text">${isDirty ? '변경됨' : '동기화됨'}</span>
        <span class="file-status-name" title="${escapeAttr(name)}">${escapeHtml(name)}</span>
        <button class="disconnect-btn" id="disconnect-btn" title="연결 해제 및 초기화">✕</button>
      `;

      saveBtn.disabled = !isDirty;
      saveBtn.textContent = isDirty ? '저장' : '저장됨';
    }
  }

  function updateSaveButtonState(){
